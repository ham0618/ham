<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Audio Visualizer - 복합 스타일</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #000; 
      font-family: Arial, sans-serif;
    }
    
    #startScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #000 0%, #1a0033 50%, #000033 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #startScreen.hidden { display: none; }
    
    .start-title {
      font-size: 48px;
      color: #00ffff;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(0,255,255,0.8);
    }
    
    #startBtn {
      padding: 20px 60px;
      font-size: 24px;
      background: linear-gradient(135deg, rgba(0,255,255,0.3), rgba(255,0,255,0.3));
      border: 3px solid #00ffff;
      color: white;
      cursor: pointer;
      border-radius: 50px;
      font-weight: bold;
      box-shadow: 0 0 30px rgba(0,255,255,0.5);
      transition: transform 0.2s;
    }
    #startBtn:hover {
      transform: scale(1.1);
    }
    
    #controls {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 100;
      color: white;
      background: rgba(0,0,0,0.85);
      padding: 20px;
      border-radius: 15px;
      border: 2px solid #00ffff;
      display: none;
    }
    #controls.visible { display: block; }
    
    button {
      padding: 10px 20px;
      margin: 5px;
      background: rgba(0,255,255,0.2);
      border: 2px solid #00ffff;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      transition: background 0.2s;
    }
    button:hover {
      background: rgba(0,255,255,0.4);
    }
    
    #status {
      margin-top: 10px;
      padding: 10px;
      background: rgba(0,0,0,0.5);
      border-radius: 5px;
      font-size: 12px;
      color: #00ffff;
      max-height: 150px;
      overflow-y: auto;
    }
    
    #fileInput { display: none; }
  </style>
</head>
<body>

<div id="startScreen">
  <div class="start-title">🎵 Audio Visualizer</div>
  <button id="startBtn">🎧 START</button>
</div>

<div id="controls">
  <div style="font-size: 18px; margin-bottom: 10px; color: #00ffff;">🎵 Controls</div>
  
  <div>
    <button id="playTestBtn">▶ 테스트 사운드</button>
    <button id="stopBtn">⏹ 정지</button>
  </div>
  
  <div style="margin-top: 10px;">
    <button id="uploadBtn">📁 음악 파일 선택</button>
    <input type="file" id="fileInput" accept="audio/*">
  </div>
  
  <div id="status">준비 중...</div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';

console.log('✅ 스크립트 로드됨!');

// 로그 함수
function log(msg) {
  const status = document.getElementById('status');
  status.innerHTML += `<div>${msg}</div>`;
  status.scrollTop = status.scrollHeight;
  console.log(msg);
}

// 씬 설정
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 40;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== 복합 3D 오브젝트 =====

// 1. 중앙 구체
const sphereGeo = new THREE.IcosahedronGeometry(8, 2);
const sphereMat = new THREE.MeshPhongMaterial({
  color: 0x00ffff,
  flatShading: true,
  emissive: 0x072534,
  shininess: 100
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
scene.add(sphere);
const originalVerts = sphereGeo.attributes.position.array.slice();

// 2. 와이어프레임 (구체 주변)
const wireGeo = new THREE.IcosahedronGeometry(10, 1);
const wireMat = new THREE.MeshBasicMaterial({
  color: 0xff00ff,
  wireframe: true,
  transparent: true,
  opacity: 0.4
});
const wire = new THREE.Mesh(wireGeo, wireMat);
scene.add(wire);

// 3. 파티클 링 3개
const particleRings = [];
for(let r = 0; r < 3; r++) {
  const count = 200;
  const positions = new Float32Array(count * 3);
  const radius = 15 + r * 5;
  
  for(let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    positions[i*3] = Math.cos(angle) * radius;
    positions[i*3+1] = (Math.random() - 0.5) * 3;
    positions[i*3+2] = Math.sin(angle) * radius;
  }
  
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  
  const mat = new THREE.PointsMaterial({
    size: 0.5,
    color: 0xffffff,
    blending: THREE.AdditiveBlending,
    transparent: true,
    opacity: 0.8
  });
  
  const points = new THREE.Points(geo, mat);
  particleRings.push(points);
  scene.add(points);
}

// 4. 주파수 바 (원형 배치)
const bars = [];
const barCount = 32;
for(let i = 0; i < barCount; i++) {
  const geo = new THREE.BoxGeometry(0.8, 1, 0.8);
  const mat = new THREE.MeshPhongMaterial({ 
    color: 0x00ffff,
    emissive: 0x001a1a
  });
  const bar = new THREE.Mesh(geo, mat);
  
  const angle = (i / barCount) * Math.PI * 2;
  const radius = 28;
  bar.position.x = Math.cos(angle) * radius;
  bar.position.z = Math.sin(angle) * radius;
  bar.rotation.y = -angle;
  
  bars.push(bar);
  scene.add(bar);
}

// 5. 외곽 링 (장식용)
const ringGeo = new THREE.TorusGeometry(35, 0.3, 16, 100);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0x00ffff,
  transparent: true,
  opacity: 0.3
});
const outerRing = new THREE.Mesh(ringGeo, ringMat);
outerRing.rotation.x = Math.PI / 2;
scene.add(outerRing);

// 조명
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(0, 0, 20);
scene.add(light);

const ambientLight = new THREE.AmbientLight(0x404040, 1);
scene.add(ambientLight);

// 추가 포인트 라이트
const light2 = new THREE.PointLight(0xff00ff, 1);
light2.position.set(20, 20, 20);
scene.add(light2);

const light3 = new THREE.PointLight(0x00ffff, 1);
light3.position.set(-20, -20, 20);
scene.add(light3);

// ===== 오디오 시스템 =====
let audioContext, analyser, dataArray, currentSource;
let isPlaying = false;

// START 버튼
document.getElementById('startBtn').addEventListener('click', function() {
  console.log('✅ START 버튼 클릭됨!');
  log('🎵 START 버튼 클릭됨!');
  
  try {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    
    log('✅ AudioContext 생성 완료!');
    log(`📊 AudioContext 상태: ${audioContext.state}`);
    
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('controls').classList.add('visible');
    
    log('✅ 준비 완료! 테스트 사운드 또는 음악 파일을 선택하세요!');
    
  } catch(e) {
    log(`❌ 에러: ${e.message}`);
    console.error(e);
  }
});

// 테스트 사운드
document.getElementById('playTestBtn').addEventListener('click', function() {
  console.log('✅ 테스트 사운드 버튼 클릭됨!');
  log('🔊 테스트 사운드 재생 시도...');
  
  if (!audioContext) {
    log('❌ AudioContext가 없습니다!');
    return;
  }
  
  try {
    if (currentSource) {
      currentSource.stop();
      currentSource.disconnect();
    }
    
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(analyser);
    analyser.connect(audioContext.destination);
    
    oscillator.frequency.value = 440;
    gainNode.gain.value = 0.3;
    oscillator.type = 'sine';
    
    if (audioContext.state === 'suspended') {
      audioContext.resume().then(() => {
        log('✅ AudioContext resumed!');
      });
    }
    
    oscillator.start();
    currentSource = oscillator;
    isPlaying = true;
    
    log('🎵 테스트 사운드 재생 중!');
    
    setTimeout(() => {
      if (oscillator) {
        oscillator.stop();
        log('⏹ 테스트 사운드 종료');
      }
    }, 3000);
    
  } catch(e) {
    log(`❌ 재생 실패: ${e.message}`);
    console.error(e);
  }
});

// 정지 버튼
document.getElementById('stopBtn').addEventListener('click', function() {
  if (currentSource) {
    currentSource.stop();
    currentSource = null;
    isPlaying = false;
    log('⏹ 정지됨');
  }
});

// 파일 업로드
document.getElementById('uploadBtn').addEventListener('click', function() {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  log(`📂 파일 로딩: ${file.name}`);
  
  if (!audioContext) {
    log('❌ 먼저 START 버튼을 눌러주세요!');
    return;
  }
  
  try {
    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
    
    log(`✅ 파일 로드 완료! (${Math.round(audioBuffer.duration)}초)`);
    
    if (currentSource) {
      currentSource.stop();
      currentSource.disconnect();
    }
    
    const source = audioContext.createBufferSource();
    source.buffer = audioBuffer;
    source.loop = true;
    source.connect(analyser);
    analyser.connect(audioContext.destination);
    
    if (audioContext.state === 'suspended') {
      await audioContext.resume();
    }
    
    source.start(0);
    currentSource = source;
    isPlaying = true;
    
    log('🎵 재생 중!');
    
  } catch(e) {
    log(`❌ 로드 실패: ${e.message}`);
    console.error(e);
  }
});

// ===== 애니메이션 =====
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;
  
  if (isPlaying && analyser && dataArray) {
    analyser.getByteFrequencyData(dataArray);
    
    // 주파수 대역 분리
    const bass = dataArray.slice(0, 30).reduce((a,b) => a+b) / 30;
    const mid = dataArray.slice(30, 100).reduce((a,b) => a+b) / 70;
    const treble = dataArray.slice(100, 128).reduce((a,b) => a+b) / 28;
    const avg = (bass + mid + treble) / 3;
    
    // 1. 중앙 구체 변형 (베이스에 반응)
    const verts = sphere.geometry.attributes.position.array;
    for(let i = 0; i < verts.length; i += 3) {
      const x = originalVerts[i];
      const y = originalVerts[i+1];
      const z = originalVerts[i+2];
      const d = Math.sqrt(x*x + y*y + z*z);
      const offset = (bass/255) * 5;
      verts[i] = x + (x/d) * offset;
      verts[i+1] = y + (y/d) * offset;
      verts[i+2] = z + (z/d) * offset;
    }
    sphere.geometry.attributes.position.needsUpdate = true;
    
    const hue1 = (time*0.1 + mid/255) % 1;
    sphereMat.color.setHSL(hue1, 1, 0.5);
    sphereMat.emissive.setHSL(hue1, 1, 0.2);
    sphere.rotation.y += 0.01;
    sphere.rotation.x += 0.005;
    
    // 2. 와이어프레임 (트레블에 반응)
    wire.rotation.x = time * 0.3;
    wire.rotation.y = time * 0.5;
    const wireScale = 1 + (treble/255) * 0.8;
    wire.scale.setScalar(wireScale);
    wireMat.opacity = 0.2 + (treble/255) * 0.4;
    
    // 3. 파티클 링
    particleRings.forEach((ring, i) => {
      ring.rotation.y = time * (0.2 + i * 0.15);
      const h = (time*0.05 + i/3) % 1;
      ring.material.color.setHSL(h, 1, 0.5);
      
      const freqIndex = 30 + i * 30;
      const freqValue = dataArray[freqIndex] || 0;
      ring.material.size = 0.5 + (freqValue/255) * 2.5;
    });
    
    // 4. 주파수 바
    bars.forEach((bar, i) => {
      const idx = Math.floor((i / bars.length) * dataArray.length);
      const value = dataArray[idx] / 255;
      bar.scale.y = 1 + value * 8;
      bar.position.y = bar.scale.y / 2;
      
      const h = (i / bars.length + time * 0.1) % 1;
      bar.material.color.setHSL(h, 1, 0.5);
      bar.material.emissive.setHSL(h, 1, 0.15);
    });
    
    // 5. 외곽 링
    outerRing.rotation.z = time * 0.2;
    outerRing.scale.setScalar(1 + (avg/255) * 0.3);
    const ringHue = (time * 0.05) % 1;
    ringMat.color.setHSL(ringHue, 1, 0.5);
    ringMat.opacity = 0.2 + (avg/255) * 0.3;
    
    // 조명 강도 변화
    light.intensity = 2 + (bass/255) * 3;
    light2.intensity = 1 + (mid/255) * 2;
    light3.intensity = 1 + (treble/255) * 2;
    
    // 조명 색상
    light.color.setHSL((time*0.1) % 1, 1, 0.5);
    light2.color.setHSL((time*0.1 + 0.33) % 1, 1, 0.5);
    light3.color.setHSL((time*0.1 + 0.66) % 1, 1, 0.5);
    
  } else {
    // 음악 없을 때 기본 애니메이션
    sphere.rotation.y += 0.005;
    sphere.rotation.x += 0.002;
    wire.rotation.x += 0.002;
    wire.rotation.y += 0.003;
    
    particleRings.forEach((ring, i) => {
      ring.rotation.y += 0.001 * (i + 1);
    });
    
    outerRing.rotation.z += 0.001;
    
    const idleHue = (time * 0.05) % 1;
    sphereMat.color.setHSL(idleHue, 1, 0.5);
  }
  
  renderer.render(scene, camera);
}

animate();

// 반응형
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

log('✅ 스크립트 초기화 완료!');
console.log('✅ 모든 이벤트 리스너 등록 완료!');
</script>
</body>
</html>
