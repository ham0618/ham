<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ CYBERPUNK VISUALIZER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body { 
      overflow: hidden; 
      background: #0a0a0a;
      font-family: 'Orbitron', monospace;
      color: #00ffff;
    }
    
    /* 그리드 배경 */
    #gridBg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: 
        linear-gradient(0deg, transparent 24%, rgba(255, 0, 255, 0.05) 25%, rgba(255, 0, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 0, 255, 0.05) 75%, rgba(255, 0, 255, 0.05) 76%, transparent 77%, transparent),
        linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, 0.05) 25%, rgba(0, 255, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.05) 75%, rgba(0, 255, 255, 0.05) 76%, transparent 77%, transparent);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 1;
    }
    
    /* 글리치 효과용 오버레이 */
    #glitchOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
      mix-blend-mode: screen;
      opacity: 0;
      animation: glitchPulse 3s infinite;
    }
    
    @keyframes glitchPulse {
      0%, 90%, 100% { opacity: 0; }
      91%, 93%, 95% { opacity: 0.1; }
    }
    
    /* START 화면 */
    #startScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: 
        radial-gradient(ellipse at center, rgba(255,0,255,0.15) 0%, transparent 70%),
        radial-gradient(ellipse at 80% 20%, rgba(0,255,255,0.15) 0%, transparent 50%),
        #0a0a0a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #startScreen.hidden { display: none; }
    
    .cyber-title {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: 8px;
      background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s linear infinite;
      text-shadow: 
        0 0 20px rgba(255,0,255,0.5),
        0 0 40px rgba(0,255,255,0.3);
      margin-bottom: 10px;
      position: relative;
    }
    
    .cyber-subtitle {
      font-size: 18px;
      letter-spacing: 6px;
      color: #00ffff;
      opacity: 0.7;
      margin-bottom: 50px;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    
    #startBtn {
      padding: 18px 60px;
      font-size: 20px;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      background: transparent;
      border: 3px solid #ff00ff;
      color: #ff00ff;
      cursor: pointer;
      letter-spacing: 4px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
      clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
    }
    
    #startBtn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,0,255,0.3), transparent);
      transition: left 0.5s;
    }
    
    #startBtn:hover {
      color: #00ffff;
      border-color: #00ffff;
      box-shadow: 
        0 0 20px rgba(0,255,255,0.5),
        inset 0 0 20px rgba(0,255,255,0.1);
    }
    
    #startBtn:hover::before {
      left: 100%;
    }
    
    /* 컨트롤 패널 */
    #controls {
      position: fixed;
      top: 30px; left: 30px;
      z-index: 100;
      background: rgba(10, 10, 10, 0.85);
      padding: 25px;
      border: 2px solid #ff00ff;
      border-left: 5px solid #00ffff;
      clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 0 100%);
      box-shadow: 
        0 0 30px rgba(255,0,255,0.3),
        inset 0 0 30px rgba(0,255,255,0.05);
      display: none;
      backdrop-filter: blur(10px);
    }
    #controls.visible { display: block; }
    
    .control-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #ff00ff;
      margin-bottom: 15px;
      text-transform: uppercase;
    }
    
    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    
    button {
      padding: 10px 20px;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,0,255,0.1);
      border: 2px solid #ff00ff;
      color: #ff00ff;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
      clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
    }
    
    button:hover {
      background: rgba(0,255,255,0.2);
      border-color: #00ffff;
      color: #00ffff;
      box-shadow: 0 0 15px rgba(0,255,255,0.4);
      transform: translateY(-2px);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    #status {
      margin-top: 15px;
      padding: 12px;
      background: rgba(0,0,0,0.6);
      border-left: 3px solid #00ffff;
      font-size: 11px;
      color: #00ffff;
      max-height: 120px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      line-height: 1.6;
    }
    
    #status::-webkit-scrollbar {
      width: 6px;
    }
    
    #status::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.3);
    }
    
    #status::-webkit-scrollbar-thumb {
      background: #ff00ff;
      border-radius: 3px;
    }
    
    #status div {
      margin-bottom: 4px;
      text-shadow: 0 0 5px rgba(0,255,255,0.5);
    }
    
    #fileInput { display: none; }
    
    /* 스캔라인 효과 */
    #scanline {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 998;
      opacity: 0.3;
    }
  </style>
</head>
<body>

<div id="gridBg"></div>
<div id="scanline"></div>
<div id="glitchOverlay"></div>

<div id="startScreen">
  <div class="cyber-title">CYBERPUNK</div>
  <div class="cyber-subtitle">AUDIO VISUALIZER</div>
  <button id="startBtn">⚡ INITIALIZE</button>
</div>

<div id="controls">
  <div class="control-title">⚡ CONTROL PANEL</div>
  
  <div class="btn-group">
    <button id="playTestBtn">▶ TEST SIGNAL</button>
    <button id="stopBtn">⏹ STOP</button>
  </div>
  
  <div class="btn-group">
    <button id="uploadBtn">📁 LOAD AUDIO</button>
  </div>
  
  <input type="file" id="fileInput" accept="audio/*">
  
  <div id="status">> System ready...</div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';

// 로그 함수
function log(msg) {
  const status = document.getElementById('status');
  const time = new Date().toLocaleTimeString();
  status.innerHTML += `<div>> [${time}] ${msg}</div>`;
  status.scrollTop = status.scrollHeight;
  console.log(msg);
}

// 씬 설정
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0a, 0.015);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 50;

const renderer = new THREE.WebGLRenderer({ 
  antialias: true,
  alpha: true 
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0a0a0a, 1);
document.body.appendChild(renderer.domElement);

// ===== 사이버펑크 3D 오브젝트 =====

// 1. 중앙 코어 (각진 형태)
const coreGeo = new THREE.OctahedronGeometry(8, 0);
const coreMat = new THREE.MeshStandardMaterial({
  color: 0xff00ff,
  emissive: 0xff00ff,
  emissiveIntensity: 0.5,
  metalness: 0.9,
  roughness: 0.1,
  wireframe: false
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// 2. 외곽 와이어프레임 (각진)
const wireGeo = new THREE.OctahedronGeometry(12, 1);
const wireMat = new THREE.MeshBasicMaterial({
  color: 0x00ffff,
  wireframe: true,
  transparent: true,
  opacity: 0.6
});
const wire = new THREE.Mesh(wireGeo, wireMat);
scene.add(wire);

// 3. 네온 링들
const rings = [];
for(let i = 0; i < 3; i++) {
  const ringGeo = new THREE.TorusGeometry(18 + i * 6, 0.3, 8, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: i % 2 === 0 ? 0xff00ff : 0x00ffff,
    transparent: true,
    opacity: 0.7
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2 + (Math.random() - 0.5) * 0.5;
  ring.rotation.y = (Math.random() - 0.5) * 0.5;
  rings.push(ring);
  scene.add(ring);
}

// 4. 주파수 바 (각진 스타일)
const bars = [];
const barCount = 64;
for(let i = 0; i < barCount; i++) {
  const geo = new THREE.BoxGeometry(1.2, 1, 1.2);
  const mat = new THREE.MeshStandardMaterial({ 
    color: i % 2 === 0 ? 0xff00ff : 0x00ffff,
    emissive: i % 2 === 0 ? 0xff00ff : 0x00ffff,
    emissiveIntensity: 0.3,
    metalness: 0.8,
    roughness: 0.2
  });
  const bar = new THREE.Mesh(geo, mat);
  
  const angle = (i / barCount) * Math.PI * 2;
  const radius = 35;
  bar.position.x = Math.cos(angle) * radius;
  bar.position.z = Math.sin(angle) * radius;
  bar.rotation.y = -angle;
  
  bars.push(bar);
  scene.add(bar);
}

// 5. 파티클 (네온 점들)
const particleCount = 1000;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);

for(let i = 0; i < particleCount; i++) {
  particlePositions[i*3] = (Math.random() - 0.5) * 200;
  particlePositions[i*3+1] = (Math.random() - 0.5) * 200;
  particlePositions[i*3+2] = (Math.random() - 0.5) * 200;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

const particleMat = new THREE.PointsMaterial({
  size: 0.8,
  color: 0x00ffff,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// 6. 그리드 플로어
const gridHelper = new THREE.GridHelper(200, 50, 0xff00ff, 0x00ffff);
gridHelper.position.y = -30;
gridHelper.material.transparent = true;
gridHelper.material.opacity = 0.3;
scene.add(gridHelper);

// 조명
const light1 = new THREE.PointLight(0xff00ff, 2, 100);
light1.position.set(20, 20, 20);
scene.add(light1);

const light2 = new THREE.PointLight(0x00ffff, 2, 100);
light2.position.set(-20, -20, 20);
scene.add(light2);

const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
scene.add(ambientLight);

// ===== 오디오 시스템 =====
let audioContext, analyser, dataArray, currentSource;
let isPlaying = false;

// START 버튼
document.getElementById('startBtn').addEventListener('click', function() {
  log('INITIALIZING SYSTEM...');
  
  try {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    
    log('AudioContext initialized');
    log(`Status: ${audioContext.state}`);
    
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('controls').classList.add('visible');
    
    log('SYSTEM READY');
    
  } catch(e) {
    log(`ERROR: ${e.message}`);
    console.error(e);
  }
});

// 테스트 사운드
document.getElementById('playTestBtn').addEventListener('click', function() {
  log('Playing test signal...');
  
  if (!audioContext) {
    log('ERROR: AudioContext not initialized');
    return;
  }
  
  try {
    if (currentSource) {
      currentSource.stop();
      currentSource.disconnect();
    }
    
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(analyser);
    analyser.connect(audioContext.destination);
    
    oscillator.frequency.value = 440;
    gainNode.gain.value = 0.3;
    oscillator.type = 'sine';
    
    if (audioContext.state === 'suspended') {
      audioContext.resume();
    }
    
    oscillator.start();
    currentSource = oscillator;
    isPlaying = true;
    
    log('Test signal active');
    
    setTimeout(() => {
      if (oscillator) {
        oscillator.stop();
        log('Test signal stopped');
      }
    }, 3000);
    
  } catch(e) {
    log(`ERROR: ${e.message}`);
    console.error(e);
  }
});

// 정지
document.getElementById('stopBtn').addEventListener('click', function() {
  if (currentSource) {
    currentSource.stop();
    currentSource = null;
    isPlaying = false;
    log('Playback stopped');
  }
});

// 파일 업로드
document.getElementById('uploadBtn').addEventListener('click', function() {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  log(`Loading: ${file.name}`);
  
  if (!audioContext) {
    log('ERROR: Initialize system first');
    return;
  }
  
  try {
    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
    
    log(`Loaded: ${Math.round(audioBuffer.duration)}s`);
    
    if (currentSource) {
      currentSource.stop();
      currentSource.disconnect();
    }
    
    const source = audioContext.createBufferSource();
    source.buffer = audioBuffer;
    source.loop = true;
    source.connect(analyser);
    analyser.connect(audioContext.destination);
    
    if (audioContext.state === 'suspended') {
      await audioContext.resume();
    }
    
    source.start(0);
    currentSource = source;
    isPlaying = true;
    
    log('Playback started');
    
  } catch(e) {
    log(`ERROR: ${e.message}`);
    console.error(e);
  }
});

// ===== 애니메이션 =====
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;
  
  if (isPlaying && analyser && dataArray) {
    analyser.getByteFrequencyData(dataArray);
    
    const bass = dataArray.slice(0, 30).reduce((a,b) => a+b) / 30;
    const mid = dataArray.slice(30, 100).reduce((a,b) => a+b) / 70;
    const treble = dataArray.slice(100, 128).reduce((a,b) => a+b) / 28;
    
    // 중앙 코어
    const coreScale = 1 + (bass/255) * 0.8;
    core.scale.setScalar(coreScale);
    core.rotation.x += 0.01;
    core.rotation.y += 0.015;
    coreMat.emissiveIntensity = 0.5 + (bass/255) * 1.5;
    
    // 와이어프레임
    wire.rotation.x += 0.005;
    wire.rotation.y -= 0.008;
    const wireScale = 1 + (mid/255) * 0.5;
    wire.scale.setScalar(wireScale);
    
    // 링들
    rings.forEach((ring, i) => {
      ring.rotation.z += 0.002 * (i + 1);
      const freqValue = dataArray[20 + i * 30] / 255;
      ring.scale.setScalar(1 + freqValue * 0.4);
      ring.material.opacity = 0.5 + freqValue * 0.4;
    });
    
    // 주파수 바
    bars.forEach((bar, i) => {
      const idx = Math.floor((i / bars.length) * dataArray.length);
      const value = dataArray[idx] / 255;
      bar.scale.y = 1 + value * 12;
      bar.position.y = (bar.scale.y - 1) * 0.5;
      bar.material.emissiveIntensity = 0.3 + value * 1.2;
    });
    
    // 파티클
    particles.rotation.y += 0.0005;
    particleMat.opacity = 0.4 + (treble/255) * 0.4;
    
    // 조명
    light1.intensity = 2 + (bass/255) * 4;
    light2.intensity = 2 + (treble/255) * 4;
    
    // 카메라 흔들림
    camera.position.x = Math.sin(time * 0.5) * (bass/255) * 2;
    camera.position.y = Math.cos(time * 0.3) * (mid/255) * 1.5;
    camera.lookAt(scene.position);
    
  } else {
    // 기본 애니메이션
    core.rotation.x += 0.003;
    core.rotation.y += 0.005;
    wire.rotation.x += 0.002;
    wire.rotation.y -= 0.003;
    
    rings.forEach((ring, i) => {
      ring.rotation.z += 0.001 * (i + 1);
    });
    
    particles.rotation.y += 0.0002;
  }
  
  renderer.render(scene, camera);
}

animate();

// 반응형
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

log('System initialized');
</script>
</body>
</html>
