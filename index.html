<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DREAM</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
    
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body { 
      overflow: hidden; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      font-family: 'Space Grotesk', sans-serif;
      color: #fff;
    }
    
    /* START 화면 */
    #startScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 50%, #fbc2eb 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #startScreen.hidden { display: none; }
    
    .dream-title {
      font-size: 120px;
      font-weight: 300;
      letter-spacing: 20px;
      color: #fff;
      margin-bottom: 20px;
      text-transform: uppercase;
      text-shadow: 0 0 40px rgba(255,255,255,0.5);
    }
    
    .dream-subtitle {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 8px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 60px;
      text-transform: uppercase;
    }
    
    #startBtn {
      padding: 20px 60px;
      font-size: 18px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.5);
      color: #fff;
      cursor: pointer;
      letter-spacing: 4px;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
      border-radius: 50px;
      transition: all 0.3s;
    }
    
    #startBtn:hover {
      background: rgba(255,255,255,0.3);
      border-color: #fff;
      box-shadow: 0 0 30px rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }
    
    /* 컨트롤 패널 */
    #controls {
      position: fixed;
      top: 30px; left: 30px;
      z-index: 100;
      background: rgba(255,255,255,0.15);
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      display: none;
    }
    #controls.visible { display: block; }
    
    .control-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
      margin-bottom: 15px;
      text-transform: uppercase;
    }
    
    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    
    button {
      padding: 12px 24px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 25px;
      backdrop-filter: blur(10px);
      transition: all 0.2s;
    }
    
    button:hover {
      background: rgba(255,255,255,0.3);
      border-color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255,255,255,0.3);
    }
    
    #status {
      margin-top: 15px;
      padding: 15px;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.9);
      max-height: 100px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      line-height: 1.6;
    }
    
    #status::-webkit-scrollbar {
      width: 6px;
    }
    
    #status::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
    }
    
    #status::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.4);
      border-radius: 3px;
    }
    
    #fileInput { display: none; }
    
    canvas {
      display: block;
    }
  </style>
</head>
<body>

<div id="startScreen">
  <div class="dream-title">DREAM</div>
  <div class="dream-subtitle">Visualizer</div>
  <button id="startBtn">Start</button>
</div>

<div id="controls">
  <div class="control-title">Control</div>
  
  <div class="btn-group">
    <button id="playTestBtn">▶ Test</button>
    <button id="stopBtn">■ Stop</button>
  </div>
  
  <div class="btn-group">
    <button id="uploadBtn">+ Load Audio</button>
  </div>
  
  <input type="file" id="fileInput" accept="audio/*">
  
  <div id="status">> Ready...</div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';

// 로그
function log(msg) {
  const status = document.getElementById('status');
  const time = new Date().toLocaleTimeString();
  status.innerHTML += `<div>> [${time}] ${msg}</div>`;
  status.scrollTop = status.scrollHeight;
}

// 씬
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x667eea, 50, 200);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 80;

const renderer = new THREE.WebGLRenderer({ 
  antialias: true,
  alpha: true 
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x667eea, 1);
document.body.appendChild(renderer.domElement);

// ===== 드림 비주얼 (동그라미 중심) =====

// 1. 중앙 대형 구체 (반투명 글래스)
const mainSphereGeo = new THREE.SphereGeometry(15, 64, 64);
const mainSphereMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.3,
  metalness: 0.1,
  roughness: 0.1,
  transmission: 0.9,
  thickness: 2,
  clearcoat: 1,
  clearcoatRoughness: 0.1
});
const mainSphere = new THREE.Mesh(mainSphereGeo, mainSphereMat);
scene.add(mainSphere);

// 2. 내부 코어 구체 (발광)
const coreGeo = new THREE.SphereGeometry(8, 32, 32);
const coreMat = new THREE.MeshStandardMaterial({
  color: 0xfbc2eb,
  emissive: 0xfbc2eb,
  emissiveIntensity: 0.5,
  transparent: true,
  opacity: 0.7
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// 3. 주파수 원형 링들 (동그라미)
const circles = [];
const circleCount = 48;
for(let i = 0; i < circleCount; i++) {
  const geo = new THREE.SphereGeometry(1.5, 16, 16);
  const hue = (i / circleCount) * 0.3 + 0.7; // 파스텔 색상
  const color = new THREE.Color().setHSL(hue, 0.6, 0.8);
  
  const mat = new THREE.MeshStandardMaterial({ 
    color: color,
    emissive: color,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: 0.8
  });
  const circle = new THREE.Mesh(geo, mat);
  
  const angle = (i / circleCount) * Math.PI * 2;
  const radius = 40;
  circle.position.x = Math.cos(angle) * radius;
  circle.position.z = Math.sin(angle) * radius;
  
  circles.push({
    mesh: circle,
    angle: angle,
    radius: radius,
    baseY: 0
  });
  scene.add(circle);
}

// 4. 떠다니는 작은 구체들 (파티클 느낌)
const floatingSpheres = [];
for(let i = 0; i < 30; i++) {
  const size = Math.random() * 2 + 0.5;
  const geo = new THREE.SphereGeometry(size, 16, 16);
  const hue = Math.random() * 0.3 + 0.7;
  const color = new THREE.Color().setHSL(hue, 0.7, 0.85);
  
  const mat = new THREE.MeshStandardMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.4,
    transparent: true,
    opacity: 0.6
  });
  
  const sphere = new THREE.Mesh(geo, mat);
  sphere.position.set(
    (Math.random() - 0.5) * 100,
    (Math.random() - 0.5) * 100,
    (Math.random() - 0.5) * 60
  );
  
  floatingSpheres.push({
    mesh: sphere,
    speed: Math.random() * 0.02 + 0.01,
    offset: Math.random() * Math.PI * 2
  });
  scene.add(sphere);
}

// 5. 외곽 링들 (토러스)
const rings = [];
for(let i = 0; i < 4; i++) {
  const ringGeo = new THREE.TorusGeometry(25 + i * 8, 0.5, 16, 64);
  const hue = 0.7 + i * 0.05;
  const color = new THREE.Color().setHSL(hue, 0.6, 0.8);
  
  const ringMat = new THREE.MeshStandardMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: 0.4
  });
  
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2 + (Math.random() - 0.5) * 0.3;
  ring.rotation.y = (Math.random() - 0.5) * 0.3;
  
  rings.push(ring);
  scene.add(ring);
}

// 6. 파티클 시스템 (별 같은 느낌)
const particleCount = 2000;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);

for(let i = 0; i < particleCount; i++) {
  particlePositions[i*3] = (Math.random() - 0.5) * 300;
  particlePositions[i*3+1] = (Math.random() - 0.5) * 300;
  particlePositions[i*3+2] = (Math.random() - 0.5) * 200;
  
  const hue = Math.random() * 0.3 + 0.7;
  const color = new THREE.Color().setHSL(hue, 0.7, 0.9);
  particleColors[i*3] = color.r;
  particleColors[i*3+1] = color.g;
  particleColors[i*3+2] = color.b;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

const particleMat = new THREE.PointsMaterial({
  size: 1.5,
  vertexColors: true,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// 조명 (부드러운 파스텔)
const light1 = new THREE.PointLight(0xfbc2eb, 2, 100);
light1.position.set(30, 30, 30);
scene.add(light1);

const light2 = new THREE.PointLight(0xa6c1ee, 2, 100);
light2.position.set(-30, -30, 30);
scene.add(light2);

const light3 = new THREE.PointLight(0xf093fb, 1.5, 100);
light3.position.set(0, 40, -30);
scene.add(light3);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

// ===== 오디오 =====
let audioContext, analyser, dataArray, currentSource;
let isPlaying = false;

document.getElementById('startBtn').addEventListener('click', function() {
  log('Initializing...');
  
  try {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    
    log('Audio context ready');
    
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('controls').classList.add('visible');
    
  } catch(e) {
    log(`Error: ${e.message}`);
  }
});

document.getElementById('playTestBtn').addEventListener('click', function() {
  log('Playing test tone...');
  
  if (!audioContext) return;
  
  try {
    if (currentSource) {
      currentSource.stop();
      currentSource.disconnect();
    }
    
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    
    osc.connect(gain);
    gain.connect(analyser);
    analyser.connect(audioContext.destination);
    
    osc.frequency.value = 440;
    gain.gain.value = 0.3;
    osc.type = 'sine';
    
    if (audioContext.state === 'suspended') {
      audioContext.resume();
    }
    
    osc.start();
    currentSource = osc;
    isPlaying = true;
    
    log('Test tone playing');
    
    setTimeout(() => {
      if (osc) {
        osc.stop();
        log('Test stopped');
      }
    }, 3000);
    
  } catch(e) {
    log(`Error: ${e.message}`);
  }
});

document.getElementById('stopBtn').addEventListener('click', function() {
  if (currentSource) {
    currentSource.stop();
    currentSource = null;
    isPlaying = false;
    log('Stopped');
  }
});

document.getElementById('uploadBtn').addEventListener('click', function() {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  log(`Loading: ${file.name}`);
  
  if (!audioContext) return;
  
  try {
    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
    
    log(`Duration: ${Math.round(audioBuffer.duration)}s`);
    
    if (currentSource) {
      currentSource.stop();
      currentSource.disconnect();
    }
    
    const source = audioContext.createBufferSource();
    source.buffer = audioBuffer;
    source.loop = true;
    source.connect(analyser);
    analyser.connect(audioContext.destination);
    
    if (audioContext.state === 'suspended') {
      await audioContext.resume();
    }
    
    source.start(0);
    currentSource = source;
    isPlaying = true;
    
    log('Playing');
    
  } catch(e) {
    log(`Error: ${e.message}`);
  }
});

// ===== 애니메이션 =====
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;
  
  if (isPlaying && analyser && dataArray) {
    analyser.getByteFrequencyData(dataArray);
    
    const bass = dataArray.slice(0, 30).reduce((a,b) => a+b) / 30;
    const mid = dataArray.slice(30, 80).reduce((a,b) => a+b) / 50;
    const treble = dataArray.slice(80, 128).reduce((a,b) => a+b) / 48;
    
    // 중앙 구체 - 부드러운 펄스
    const mainScale = 1 + (bass/255) * 0.5;
    mainSphere.scale.setScalar(mainScale);
    mainSphere.rotation.y += 0.002;
    mainSphereMat.opacity = 0.2 + (bass/255) * 0.3;
    
    // 코어 - 발광 강도
    const coreScale = 1 + (mid/255) * 0.6;
    core.scale.setScalar(coreScale);
    core.rotation.x += 0.005;
    core.rotation.y -= 0.003;
    coreMat.emissiveIntensity = 0.5 + (mid/255) * 1;
    
    // 동그라미들 - 파도 효과
    circles.forEach((item, i) => {
      const idx = Math.floor((i / circles.length) * dataArray.length);
      const value = dataArray[idx] / 255;
      
      // Y축 움직임 (파도)
      item.mesh.position.y = Math.sin(time * 2 + item.angle * 3) * 5 + value * 15;
      
      // 크기 변화
      const scale = 1 + value * 2;
      item.mesh.scale.setScalar(scale);
      
      // 발광 강도
      item.mesh.material.emissiveIntensity = 0.3 + value * 0.7;
      item.mesh.material.opacity = 0.6 + value * 0.3;
    });
    
    // 떠다니는 구체들
    floatingSpheres.forEach((item, i) => {
      const freqValue = dataArray[i * 4] / 255;
      item.mesh.position.y += Math.sin(time + item.offset) * item.speed;
      item.mesh.scale.setScalar(1 + freqValue * 0.5);
      item.mesh.material.emissiveIntensity = 0.4 + freqValue * 0.6;
    });
    
    // 링들
    rings.forEach((ring, i) => {
      ring.rotation.z += 0.001 * (i + 1);
      const freqValue = dataArray[20 + i * 20] / 255;
      ring.scale.setScalar(1 + freqValue * 0.3);
      ring.material.opacity = 0.3 + freqValue * 0.3;
    });
    
    // 파티클
    particles.rotation.y += 0.0003;
    particleMat.opacity = 0.4 + (treble/255) * 0.4;
    
    // 조명
    light1.intensity = 2 + (bass/255) * 2;
    light2.intensity = 2 + (mid/255) * 2;
    light3.intensity = 1.5 + (treble/255) * 1.5;
    
    // 카메라 - 부드러운 움직임
    camera.position.x = Math.sin(time * 0.3) * (bass/255) * 5;
    camera.position.y = Math.cos(time * 0.2) * (mid/255) * 3;
    camera.lookAt(scene.position);
    
  } else {
    // 기본 애니메이션
    mainSphere.rotation.y += 0.001;
    core.rotation.x += 0.002;
    core.rotation.y -= 0.001;
    
    circles.forEach((item, i) => {
      item.mesh.position.y = Math.sin(time + item.angle * 3) * 3;
    });
    
    floatingSpheres.forEach((item) => {
      item.mesh.position.y += Math.sin(time + item.offset) * item.speed;
    });
    
    rings.forEach((ring, i) => {
      ring.rotation.z += 0.0005 * (i + 1);
    });
    
    particles.rotation.y += 0.0001;
  }
  
  renderer.render(scene, camera);
}

animate();

// 반응형
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

log('System ready');
</script>
</body>
</html>
