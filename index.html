<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: #000; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
      color: white;
      background: rgba(0,0,0,0.8);
      padding: 20px;
      border-radius: 15px;
      border: 2px solid #00ffff;
      backdrop-filter: blur(10px);
    }
    .title {
      font-size: 18px;
      margin-bottom: 15px;
      color: #00ffff;
    }
    .upload-area {
      border: 3px dashed #00ffff;
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(0,255,255,0.05);
      margin-bottom: 15px;
    }
    .upload-area:hover {
      background: rgba(0,255,255,0.15);
      border-color: #ff00ff;
    }
    .upload-area.dragover {
      background: rgba(0,255,255,0.3);
      border-color: #ff00ff;
      transform: scale(1.02);
    }
    #fileInput {
      display: none;
    }
    button {
      margin: 5px;
      padding: 12px 24px;
      background: rgba(0,255,255,0.2);
      border: 2px solid #00ffff;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
      font-weight: 600;
    }
    button:hover {
      background: rgba(0,255,255,0.4);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,255,255,0.3);
    }
    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    #status {
      margin-top: 15px;
      color: #00ffff;
      font-size: 13px;
      line-height: 1.6;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 5px;
      max-height: 150px;
      overflow-y: auto;
    }
    .status-line {
      margin: 3px 0;
    }
    .error {
      color: #ff3366;
    }
    .success {
      color: #00ff88;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
<div id="controls">
  <div class="title">🎵 Audio Reactive Visualizer</div>
  
  <div class="upload-area" id="uploadArea">
    <div class="icon">🎧</div>
    <div>01.mp3 파일을 드래그하거나</div>
    <div style="margin-top: 10px; color: #00ffff;">클릭해서 선택하세요</div>
  </div>
  
  <input type="file" id="fileInput" accept="audio/*">
  
  <div>
    <button id="playBtn" disabled>▶ Play</button>
    <button id="pauseBtn" disabled>⏸ Pause</button>
  </div>
  
  <div id="status">
    <div class="status-line">✨ 준비 완료! 음악 파일을 선택하세요</div>
  </div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js';

// 로그 함수
function log(message, type = 'info') {
  const statusDiv = document.getElementById('status');
  const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
  const icon = type === 'error' ? '❌' : type === 'success' ? '✅' : '📝';
  statusDiv.innerHTML += `<div class="status-line ${className}">${icon} ${message}</div>`;
  statusDiv.scrollTop = statusDiv.scrollHeight;
  console.log(message);
}

// 씬 설정
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 1, 100);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 50;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// 오디오 변수
let audioContext, analyser, dataArray, audioSource;
let isAudioStarted = false;
let currentAudioBuffer = null;

// 파일 업로드 처리
async function loadAudioFile(file) {
  try {
    log(`파일 로딩 중: ${file.name}`, 'info');
    
    // AudioContext 생성
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.8;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      log('AudioContext 생성 완료', 'success');
    }
    
    // 기존 오디오 정지
    if (audioSource) {
      audioSource.stop();
      audioSource.disconnect();
    }
    
    // 파일 읽기
    const arrayBuffer = await file.arrayBuffer();
    log('파일 읽기 완료', 'success');
    
    // 오디오 디코딩
    currentAudioBuffer = await audioContext.decodeAudioData(arrayBuffer);
    log(`디코딩 완료! (${Math.round(currentAudioBuffer.duration)}초)`, 'success');
    
    // 버튼 활성화
    document.getElementById('playBtn').disabled = false;
    document.getElementById('pauseBtn').disabled = false;
    
    log('▶ Play 버튼을 눌러주세요!', 'success');
    
  } catch(e) {
    log(`에러 발생: ${e.message}`, 'error');
    console.error(e);
  }
}

// 재생 함수
function playAudio() {
  try {
    if (!currentAudioBuffer) {
      log('먼저 파일을 선택해주세요', 'error');
      return;
    }
    
    // 기존 소스 정지
    if (audioSource) {
      audioSource.stop();
      audioSource.disconnect();
    }
    
    // 새 소스 생성
    audioSource = audioContext.createBufferSource();
    audioSource.buffer = currentAudioBuffer;
    audioSource.loop = true;
    audioSource.connect(analyser);
    analyser.connect(audioContext.destination);
    
    // AudioContext Resume
    if (audioContext.state === 'suspended') {
      audioContext.resume();
    }
    
    audioSource.start(0);
    isAudioStarted = true;
    
    log('🎵 재생 중!', 'success');
    
  } catch(e) {
    log(`재생 에러: ${e.message}`, 'error');
  }
}

// 일시정지 함수
function pauseAudio() {
  if (audioSource) {
    audioSource.stop();
    isAudioStarted = false;
    log('⏸ 일시정지', 'info');
  }
}

// 파일 입력 이벤트
const fileInput = document.getElementById('fileInput');
const uploadArea = document.getElementById('uploadArea');

uploadArea.addEventListener('click', () => {
  fileInput.click();
});

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    loadAudioFile(file);
  }
});

// 드래그 앤 드롭
uploadArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', () => {
  uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('audio/')) {
    loadAudioFile(file);
  } else {
    log('오디오 파일만 업로드 가능합니다', 'error');
  }
});

// 버튼 이벤트
document.getElementById('playBtn').addEventListener('click', playAudio);
document.getElementById('pauseBtn').addEventListener('click', pauseAudio);

// 3D 오브젝트 생성
const sphereGeometry = new THREE.IcosahedronGeometry(15, 4);
const sphereMaterial = new THREE.MeshPhongMaterial({
  color: 0x00ffff,
  wireframe: false,
  flatShading: true,
  emissive: 0x072534,
  shininess: 100
});
const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
scene.add(sphere);

const wireframeGeometry = new THREE.IcosahedronGeometry(15.5, 4);
const wireframeMaterial = new THREE.MeshBasicMaterial({
  color: 0xff00ff,
  wireframe: true,
  transparent: true,
  opacity: 0.3
});
const wireframe = new THREE.Mesh(wireframeGeometry, wireframeMaterial);
scene.add(wireframe);

// 파티클 링
const ringParticles = [];
const ringCount = 3;

for(let ring = 0; ring < ringCount; ring++) {
  const particleCount = 200;
  const positions = new Float32Array(particleCount * 3);
  const radius = 25 + ring * 10;
  
  for(let i = 0; i < particleCount; i++) {
    const angle = (i / particleCount) * Math.PI * 2;
    positions[i * 3] = Math.cos(angle) * radius;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 5;
    positions[i * 3 + 2] = Math.sin(angle) * radius;
  }
  
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  
  const material = new THREE.PointsMaterial({
    size: 0.5,
    color: new THREE.Color().setHSL(ring / ringCount, 1, 0.5),
    blending: THREE.AdditiveBlending,
    transparent: true
  });
  
  const particles = new THREE.Points(geometry, material);
  ringParticles.push(particles);
  scene.add(particles);
}

// 조명
const pointLight = new THREE.PointLight(0xffffff, 1, 100);
pointLight.position.set(0, 0, 30);
scene.add(pointLight);

const ambientLight = new THREE.AmbientLight(0x404040);
scene.add(ambientLight);

// 애니메이션
let time = 0;
const originalVertices = sphereGeometry.attributes.position.array.slice();

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;
  
  if (isAudioStarted && analyser) {
    analyser.getByteFrequencyData(dataArray);
    
    const bass = dataArray.slice(0, 10).reduce((a, b) => a + b) / 10;
    const mid = dataArray.slice(10, 50).reduce((a, b) => a + b) / 40;
    const treble = dataArray.slice(50, 100).reduce((a, b) => a + b) / 50;
    
    // 구체 변형
    const vertices = sphere.geometry.attributes.position.array;
    
    for(let i = 0; i < vertices.length; i += 3) {
      const x = originalVertices[i];
      const y = originalVertices[i + 1];
      const z = originalVertices[i + 2];
      
      const distance = Math.sqrt(x*x + y*y + z*z);
      const offset = bass / 255 * 5;
      
      vertices[i] = x + (x / distance) * offset;
      vertices[i + 1] = y + (y / distance) * offset;
      vertices[i + 2] = z + (z / distance) * offset;
    }
    sphere.geometry.attributes.position.needsUpdate = true;
    
    // 색상 변화
    const hue = (time * 0.1 + mid / 255) % 1;
    sphereMaterial.color.setHSL(hue, 1, 0.5);
    sphereMaterial.emissive.setHSL(hue, 1, 0.2);
    
    // 와이어프레임
    wireframe.rotation.x = time * 0.5;
    wireframe.rotation.y = time * 0.3;
    wireframe.scale.set(1 + treble/255 * 0.3, 1 + treble/255 * 0.3, 1 + treble/255 * 0.3);
    
    // 파티클 링
    ringParticles.forEach((ring, idx) => {
      ring.rotation.y = time * (0.2 + idx * 0.1);
      ring.material.size = 0.5 + (dataArray[idx * 30] / 255) * 2;
      
      const hue = (time * 0.05 + idx / ringCount) % 1;
      ring.material.color.setHSL(hue, 1, 0.5);
    });
    
    // 조명
    pointLight.intensity = 1 + bass / 255 * 2;
    pointLight.color.setHSL((time * 0.1) % 1, 1, 0.5);
  } else {
    // 기본 애니메이션
    sphere.rotation.y += 0.005;
    wireframe.rotation.x += 0.002;
    wireframe.rotation.y += 0.003;
    
    const hue = (time * 0.05) % 1;
    sphereMaterial.color.setHSL(hue, 1, 0.5);
  }
  
  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
