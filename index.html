<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQUA DIGITAL NATURE - Custom 3D</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap');
    
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body { 
      overflow: hidden; 
      background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #98D8C8 100%);
      font-family: 'Quicksand', sans-serif;
      color: #fff;
    }
    
    /* 그레인 노이즈 효과 */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.15"/></svg>');
      pointer-events: none;
      z-index: 999;
      mix-blend-mode: overlay;
    }
    
    /* START 화면 */
    #startScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #startScreen.hidden { display: none; }
    
    .title {
      font-size: 80px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #fff;
      margin-bottom: 15px;
      text-transform: uppercase;
      text-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    
    .subtitle {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 6px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 50px;
      text-transform: uppercase;
    }
    
    #startBtn {
      padding: 18px 50px;
      font-size: 16px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.6);
      color: #fff;
      cursor: pointer;
      letter-spacing: 3px;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
      border-radius: 40px;
      transition: all 0.3s;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    
    #startBtn:hover {
      background: rgba(255,255,255,0.35);
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.25);
    }
    
    /* 컨트롤 패널 */
    #controls {
      position: fixed;
      top: 25px; left: 25px;
      z-index: 100;
      background: rgba(255,255,255,0.2);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      display: none;
      max-width: 300px;
    }
    #controls.visible { display: block; }
    
    .control-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    
    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.8);
      margin-top: 15px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    
    .btn-group {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    
    button {
      padding: 10px 20px;
      font-family: 'Quicksand', sans-serif;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.5);
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      transition: all 0.2s;
    }
    
    button:hover {
      background: rgba(255,255,255,0.4);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255,255,255,0.3);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    #status {
      margin-top: 12px;
      padding: 12px;
      background: rgba(0,0,0,0.15);
      border-radius: 10px;
      font-size: 10px;
      color: rgba(255,255,255,0.95);
      max-height: 120px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      line-height: 1.5;
    }
    
    #status::-webkit-scrollbar { width: 5px; }
    #status::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 3px; }
    #status::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 3px; }
    
    .file-input { display: none; }
    
    .model-info {
      margin-top: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.9);
    }
    
    canvas { display: block; }
  </style>
</head>
<body>

<div id="startScreen">
  <div class="title">AQUA DIGITAL</div>
  <div class="subtitle">Custom 3D Visualizer</div>
  <button id="startBtn">Enter</button>
</div>

<div id="controls">
  <div class="control-title">Control Panel</div>
  
  <div class="section-title">🎵 Audio</div>
  <div class="btn-group">
    <button id="playTestBtn">▶ Test</button>
    <button id="stopBtn">■ Stop</button>
  </div>
  
  <div class="btn-group">
    <button id="uploadAudioBtn">+ Audio File</button>
  </div>
  
  <div class="section-title">🎨 3D Model</div>
  <div class="btn-group">
    <button id="upload3DBtn">+ Load GLB/GLTF</button>
    <button id="remove3DBtn" disabled>✕ Remove</button>
  </div>
  
  <div id="modelInfo" class="model-info" style="display:none;">
    <div>📦 Model: <span id="modelName">-</span></div>
    <div>📏 Size: <span id="modelSize">-</span></div>
  </div>
  
  <input type="file" id="audioInput" class="file-input" accept="audio/*">
  <input type="file" id="modelInput" class="file-input" accept=".glb,.gltf">
  
  <div id="status">> Ready...</div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

function log(msg) {
  const status = document.getElementById('status');
  const time = new Date().toLocaleTimeString();
  status.innerHTML += `<div>> [${time}] ${msg}</div>`;
  status.scrollTop = status.scrollHeight;
}

// 씬
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87CEEB, 80, 250);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 20, 100);

const renderer = new THREE.WebGLRenderer({ 
  antialias: true,
  alpha: true 
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x87CEEB, 1);
document.body.appendChild(renderer.domElement);

// GLTF 로더
const gltfLoader = new GLTFLoader();
let customModel = null;
let customModelGroup = new THREE.Group();
scene.add(customModelGroup);

// ===== 기존 씬 요소들 =====

// 1. 중앙 지구본
const globeGeo = new THREE.SphereGeometry(18, 64, 64);
const globeMat = new THREE.MeshPhysicalMaterial({
  color: 0x4A90E2,
  transparent: true,
  opacity: 0.4,
  metalness: 0.1,
  roughness: 0.1,
  transmission: 0.8,
  thickness: 1.5,
  clearcoat: 1,
  clearcoatRoughness: 0.1
});
const globe = new THREE.Mesh(globeGeo, globeMat);
scene.add(globe);

const coreGeo = new THREE.SphereGeometry(12, 32, 32);
const coreMat = new THREE.MeshStandardMaterial({
  color: 0x98D8C8,
  emissive: 0x98D8C8,
  emissiveIntensity: 0.4,
  transparent: true,
  opacity: 0.6
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// 2. 물방울들
const waterDrops = [];
const dropCount = 60;
for(let i = 0; i < dropCount; i++) {
  const size = Math.random() * 2 + 1;
  const geo = new THREE.SphereGeometry(size, 16, 16);
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0x4FC3F7,
    transparent: true,
    opacity: 0.7,
    metalness: 0.2,
    roughness: 0.1,
    transmission: 0.9,
    thickness: 0.5
  });
  
  const drop = new THREE.Mesh(geo, mat);
  
  const angle = (i / dropCount) * Math.PI * 2;
  const radius = 35 + Math.random() * 15;
  drop.position.x = Math.cos(angle) * radius;
  drop.position.z = Math.sin(angle) * radius;
  drop.position.y = (Math.random() - 0.5) * 30;
  
  waterDrops.push({
    mesh: drop,
    angle: angle,
    radius: radius,
    speed: Math.random() * 0.02 + 0.01,
    offset: Math.random() * Math.PI * 2
  });
  scene.add(drop);
}

// 3. 나비들
const butterflies = [];
for(let i = 0; i < 15; i++) {
  const group = new THREE.Group();
  
  const wingGeo = new THREE.ConeGeometry(1.5, 3, 8);
  const wingMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(Math.random() * 0.15 + 0.05, 0.8, 0.6),
    emissive: new THREE.Color().setHSL(Math.random() * 0.15 + 0.05, 0.8, 0.5),
    emissiveIntensity: 0.3
  });
  
  const leftWing = new THREE.Mesh(wingGeo, wingMat);
  leftWing.rotation.z = Math.PI / 2;
  leftWing.position.x = -1;
  
  const rightWing = new THREE.Mesh(wingGeo, wingMat.clone());
  rightWing.rotation.z = -Math.PI / 2;
  rightWing.position.x = 1;
  
  group.add(leftWing, rightWing);
  
  group.position.set(
    (Math.random() - 0.5) * 80,
    Math.random() * 40 + 10,
    (Math.random() - 0.5) * 80
  );
  
  butterflies.push({
    group: group,
    speed: Math.random() * 0.02 + 0.01,
    offset: Math.random() * Math.PI * 2,
    leftWing: leftWing,
    rightWing: rightWing
  });
  scene.add(group);
}

// 4. 물결
const waterGeo = new THREE.PlaneGeometry(200, 200, 50, 50);
const waterMat = new THREE.MeshStandardMaterial({
  color: 0x4FC3F7,
  transparent: true,
  opacity: 0.4,
  metalness: 0.3,
  roughness: 0.2,
  side: THREE.DoubleSide
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
water.position.y = -30;
scene.add(water);

const waterPositions = waterGeo.attributes.position;

// 5. 구름
const cloudParticles = [];
for(let i = 0; i < 20; i++) {
  const cloudGeo = new THREE.SphereGeometry(5, 8, 8);
  const cloudMat = new THREE.MeshStandardMaterial({
    color: 0xFFFFFF,
    transparent: true,
    opacity: 0.6
  });
  const cloud = new THREE.Mesh(cloudGeo, cloudMat);
  cloud.position.set(
    (Math.random() - 0.5) * 150,
    Math.random() * 40 + 30,
    (Math.random() - 0.5) * 150
  );
  cloudParticles.push(cloud);
  scene.add(cloud);
}

// 6. 별
const starCount = 1500;
const starGeo = new THREE.BufferGeometry();
const starPositions = new Float32Array(starCount * 3);
const starColors = new Float32Array(starCount * 3);

for(let i = 0; i < starCount; i++) {
  starPositions[i*3] = (Math.random() - 0.5) * 400;
  starPositions[i*3+1] = (Math.random() - 0.5) * 400;
  starPositions[i*3+2] = (Math.random() - 0.5) * 400;
  
  const color = new THREE.Color().setHSL(Math.random() * 0.3 + 0.5, 0.5, 0.8);
  starColors[i*3] = color.r;
  starColors[i*3+1] = color.g;
  starColors[i*3+2] = color.b;
}

starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

const starMat = new THREE.PointsMaterial({
  size: 1.2,
  vertexColors: true,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending
});

const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// 조명
const sunLight = new THREE.DirectionalLight(0xFFFFAA, 1.5);
sunLight.position.set(50, 50, 50);
scene.add(sunLight);

const skyLight = new THREE.HemisphereLight(0x87CEEB, 0x98D8C8, 0.8);
scene.add(skyLight);

const pointLight1 = new THREE.PointLight(0x4FC3F7, 2, 100);
pointLight1.position.set(30, 20, 30);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x98D8C8, 2, 100);
pointLight2.position.set(-30, 20, -30);
scene.add(pointLight2);

const ambientLight = new THREE.AmbientLight(0xFFFFFF, 0.5);
scene.add(ambientLight);

// ===== 3D 모델 로드 함수 =====
function load3DModel(file) {
  log(`Loading 3D model: ${file.name}`);
  
  const reader = new FileReader();
  
  reader.onload = function(e) {
    const arrayBuffer = e.target.result;
    
    gltfLoader.parse(arrayBuffer, '', function(gltf) {
      // 기존 모델 제거
      if (customModel) {
        customModelGroup.remove(customModel);
      }
      
      customModel = gltf.scene;
      
      // 모델 크기 조정
      const box = new THREE.Box3().setFromObject(customModel);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 30 / maxDim; // 적절한 크기로 스케일
      customModel.scale.setScalar(scale);
      
      // 모델 중앙 정렬
      box.setFromObject(customModel);
      const center = box.getCenter(new THREE.Vector3());
      customModel.position.sub(center);
      
      // 위치 조정 (지구본 위에)
      customModel.position.y += 30;
      
      customModelGroup.add(customModel);
      
      log(`✓ Model loaded: ${file.name}`);
      log(`  Size: ${size.x.toFixed(1)} x ${size.y.toFixed(1)} x ${size.z.toFixed(1)}`);
      
      // UI 업데이트
      document.getElementById('modelName').textContent = file.name;
      document.getElementById('modelSize').textContent = 
        `${size.x.toFixed(1)} x ${size.y.toFixed(1)} x ${size.z.toFixed(1)}`;
      document.getElementById('modelInfo').style.display = 'block';
      document.getElementById('remove3DBtn').disabled = false;
      
    }, function(error) {
      log(`✗ Error loading model: ${error.message}`);
    });
  };
  
  reader.readAsArrayBuffer(file);
}

// ===== 오디오 =====
let audioContext, analyser, dataArray, currentSource;
let isPlaying = false;

document.getElementById('startBtn').addEventListener('click', function() {
  log('Initializing audio context...');
  
  try {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    
    log('✓ Audio ready');
    
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('controls').classList.add('visible');
    
  } catch(e) {
    log(`✗ Error: ${e.message}`);
  }
});

document.getElementById('playTestBtn').addEventListener('click', function() {
  log('Playing test tone...');
  
  if (!audioContext) return;
  
  try {
    if (currentSource) {
      currentSource.stop();
      currentSource.disconnect();
    }
    
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    
    osc.connect(gain);
    gain.connect(analyser);
    analyser.connect(audioContext.destination);
    
    osc.frequency.value = 440;
    gain.gain.value = 0.3;
    osc.type = 'sine';
    
    if (audioContext.state === 'suspended') {
      audioContext.resume();
    }
    
    osc.start();
    currentSource = osc;
    isPlaying = true;
    
    log('▶ Playing');
    
    setTimeout(() => {
      if (osc) {
        osc.stop();
        log('■ Stopped');
        isPlaying = false;
      }
    }, 3000);
    
  } catch(e) {
    log(`✗ Error: ${e.message}`);
  }
});

document.getElementById('stopBtn').addEventListener('click', function() {
  if (currentSource) {
    currentSource.stop();
    currentSource = null;
    isPlaying = false;
    log('■ Stopped');
  }
});

document.getElementById('uploadAudioBtn').addEventListener('click', function() {
  document.getElementById('audioInput').click();
});

document.getElementById('audioInput').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  log(`Loading audio: ${file.name}`);
  
  if (!audioContext) return;
  
  try {
    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
    
    log(`✓ Audio loaded (${Math.round(audioBuffer.duration)}s)`);
    
    if (currentSource) {
      currentSource.stop();
      currentSource.disconnect();
    }
    
    const source = audioContext.createBufferSource();
    source.buffer = audioBuffer;
    source.loop = true;
    source.connect(analyser);
    analyser.connect(audioContext.destination);
    
    if (audioContext.state === 'suspended') {
      await audioContext.resume();
    }
    
    source.start(0);
    currentSource = source;
    isPlaying = true;
    
    log('▶ Playing');
    
  } catch(e) {
    log(`✗ Error: ${e.message}`);
  }
});

// 3D 모델 업로드
document.getElementById('upload3DBtn').addEventListener('click', function() {
  document.getElementById('modelInput').click();
});

document.getElementById('modelInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  load3DModel(file);
});

// 3D 모델 제거
document.getElementById('remove3DBtn').addEventListener('click', function() {
  if (customModel) {
    customModelGroup.remove(customModel);
    customModel = null;
    
    document.getElementById('modelInfo').style.display = 'none';
    document.getElementById('remove3DBtn').disabled = true;
    
    log('✓ Model removed');
  }
});

// ===== 애니메이션 =====
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;
  
  if (isPlaying && analyser && dataArray) {
    analyser.getByteFrequencyData(dataArray);
    
    const bass = dataArray.slice(0, 30).reduce((a,b) => a+b) / 30;
    const mid = dataArray.slice(30, 80).reduce((a,b) => a+b) / 50;
    const treble = dataArray.slice(80, 128).reduce((a,b) => a+b) / 48;
    
    // 지구본
    const globeScale = 1 + (bass/255) * 0.3;
    globe.scale.setScalar(globeScale);
    globe.rotation.y += 0.002;
    globeMat.opacity = 0.3 + (bass/255) * 0.2;
    
    // 코어
    const coreScale = 1 + (mid/255) * 0.4;
    core.scale.setScalar(coreScale);
    core.rotation.x += 0.003;
    core.rotation.y -= 0.002;
    coreMat.emissiveIntensity = 0.4 + (mid/255) * 0.6;
    
    // 커스텀 3D 모델 애니메이션
    if (customModel) {
      customModel.rotation.y += 0.01;
      customModel.rotation.x = Math.sin(time) * 0.2;
      
      const modelScale = 1 + (bass/255) * 0.3;
      customModel.scale.setScalar(modelScale);
      
      customModel.position.y = 30 + Math.sin(time * 2) * 5 + (mid/255) * 10;
    }
    
    // 물방울들
    waterDrops.forEach((item, i) => {
      const idx = Math.floor((i / waterDrops.length) * dataArray.length);
      const value = dataArray[idx] / 255;
      
      item.mesh.position.y = Math.sin(time * 2 + item.offset) * 15 + value * 10;
      item.mesh.scale.setScalar(1 + value * 1.5);
      item.mesh.material.opacity = 0.5 + value * 0.4;
    });
    
    // 나비들
    butterflies.forEach((item, i) => {
      const freqValue = dataArray[i * 8] / 255;
      
      item.group.position.y += Math.sin(time * 3 + item.offset) * 0.1;
      item.group.rotation.y += 0.02;
      
      const wingAngle = Math.sin(time * 10) * 0.5;
      item.leftWing.rotation.y = wingAngle;
      item.rightWing.rotation.y = -wingAngle;
      
      item.group.scale.setScalar(1 + freqValue * 0.3);
    });
    
    // 물결
    for(let i = 0; i < waterPositions.count; i++) {
      const x = waterPositions.getX(i);
      const y = waterPositions.getY(i);
      const wave = Math.sin(x * 0.1 + time * 2) * Math.cos(y * 0.1 + time * 2) * (bass/255) * 3;
      waterPositions.setZ(i, wave);
    }
    waterPositions.needsUpdate = true;
    
    // 구름
    cloudParticles.forEach((cloud, i) => {
      cloud.position.x += 0.02;
      if (cloud.position.x > 100) cloud.position.x = -100;
      cloud.material.opacity = 0.4 + (treble/255) * 0.3;
    });
    
    // 별
    stars.rotation.y += 0.0002;
    starMat.opacity = 0.5 + (treble/255) * 0.4;
    
    // 조명
    pointLight1.intensity = 2 + (bass/255) * 2;
    pointLight2.intensity = 2 + (mid/255) * 2;
    
    // 카메라
    camera.position.x = Math.sin(time * 0.2) * (bass/255) * 3;
    camera.position.y = 20 + Math.cos(time * 0.15) * (mid/255) * 2;
    camera.lookAt(scene.position);
    
  } else {
    // 기본 애니메이션
    globe.rotation.y += 0.001;
    core.rotation.x += 0.001;
    core.rotation.y -= 0.001;
    
    // 커스텀 모델 기본 회전
    if (customModel) {
      customModel.rotation.y += 0.005;
      customModel.position.y = 30 + Math.sin(time) * 3;
    }
    
    waterDrops.forEach((item) => {
      item.mesh.position.y = Math.sin(time + item.offset) * 10;
    });
    
    butterflies.forEach((item) => {
      item.group.position.y += Math.sin(time * 2 + item.offset) * 0.05;
      item.group.rotation.y += 0.01;
      
      const wingAngle = Math.sin(time * 8) * 0.4;
      item.leftWing.rotation.y = wingAngle;
      item.rightWing.rotation.y = -wingAngle;
    });
    
    for(let i = 0; i < waterPositions.count; i++) {
      const x = waterPositions.getX(i);
      const y = waterPositions.getY(i);
      const wave = Math.sin(x * 0.1 + time) * Math.cos(y * 0.1 + time) * 1;
      waterPositions.setZ(i, wave);
    }
    waterPositions.needsUpdate = true;
    
    cloudParticles.forEach((cloud) => {
      cloud.position.x += 0.01;
      if (cloud.position.x > 100) cloud.position.x = -100;
    });
    
    stars.rotation.y += 0.0001;
  }
  
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

log('✓ System ready');
log('Upload GLB/GLTF file to add your 3D model!');
</script>
</body>
</html>
