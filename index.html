<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Audio Visualizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body { 
      overflow: hidden; 
      background: #000; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    /* 시작 화면 */
    #startScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000033 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.5s;
    }
    #startScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .start-title {
      font-size: 48px;
      color: #00ffff;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(0,255,255,0.8);
      animation: pulse 2s infinite;
    }
    .start-subtitle {
      font-size: 18px;
      color: #888;
      margin-bottom: 40px;
    }
    #startBtn {
      padding: 20px 60px;
      font-size: 24px;
      background: linear-gradient(135deg, rgba(0,255,255,0.3), rgba(255,0,255,0.3));
      border: 3px solid #00ffff;
      color: white;
      cursor: pointer;
      border-radius: 50px;
      font-weight: bold;
      transition: all 0.3s;
      box-shadow: 0 0 30px rgba(0,255,255,0.5);
      animation: glow 2s infinite;
    }
    #startBtn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 50px rgba(0,255,255,0.8);
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 30px rgba(0,255,255,0.5); }
      50% { box-shadow: 0 0 50px rgba(255,0,255,0.8); }
    }
    
    /* 컨트롤 패널 */
    #controls {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      color: white;
      background: rgba(0,0,0,0.85);
      padding: 20px;
      border-radius: 15px;
      border: 2px solid #00ffff;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,255,255,0.3);
      opacity: 0;
      transition: opacity 0.5s;
    }
    #controls.visible {
      opacity: 1;
    }
    .title {
      font-size: 20px;
      margin-bottom: 15px;
      color: #00ffff;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0,255,255,0.5);
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    button {
      flex: 1;
      padding: 12px 20px;
      background: linear-gradient(135deg, rgba(0,255,255,0.2), rgba(255,0,255,0.2));
      border: 2px solid #00ffff;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }
    button:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(0,255,255,0.4), rgba(255,0,255,0.4));
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,255,255,0.4);
    }
    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .upload-section {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(0,255,255,0.3);
    }
    .upload-area {
      border: 2px dashed #00ffff;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(0,255,255,0.05);
      font-size: 13px;
    }
    .upload-area:hover {
      background: rgba(0,255,255,0.15);
      border-color: #ff00ff;
    }
    #fileInput {
      display: none;
    }
    #status {
      margin-top: 15px;
      padding: 10px;
      background: rgba(0,0,0,0.5);
      border-radius: 5px;
      font-size: 12px;
      color: #00ffff;
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<!-- 시작 화면 -->
<div id="startScreen">
  <div class="start-title">🎵 Audio Visualizer</div>
  <div class="start-subtitle">3D 오디오 비주얼라이저</div>
  <button id="startBtn">🎧 START</button>
</div>

<!-- 컨트롤 패널 -->
<div id="controls">
  <div class="title">🎵 Audio Visualizer</div>
  
  <div class="button-group">
    <button id="playBtn" disabled>▶ Play</button>
    <button id="pauseBtn" disabled>⏸ Pause</button>
  </div>
  
  <div class="upload-section">
    <div style="color: #888; font-size: 11px; margin-bottom: 8px;">다른 음악 선택:</div>
    <div class="upload-area" id="uploadArea">
      🎧 클릭 또는 드래그
    </div>
    <input type="file" id="fileInput" accept="audio/*">
  </div>
  
  <div id="status">준비 중...</div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js';

// 로그
const statusDiv = document.getElementById('status');
function log(msg) {
  statusDiv.textContent = msg;
  console.log(msg);
}

// 씬 설정
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 1, 100);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 50;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;

// 오디오 변수
let audioContext, analyser, dataArray, currentSource;
let isPlaying = false;
let audioBuffer = null;

// START 버튼 클릭 - AudioContext 초기화
document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    log('🎵 초기화 중...');
    
    // AudioContext 생성 (사용자 클릭으로!)
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.8;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    
    log('✅ AudioContext 생성 완료!');
    
    // 01.mp3 로드 시도
    try {
      const response = await fetch('01.mp3');
      if (response.ok) {
        const arrayBuffer = await response.arrayBuffer();
        audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        log(`✅ 01.mp3 로드 완료! (${Math.round(audioBuffer.duration)}초)`);
        
        // 버튼 활성화
        document.getElementById('playBtn').disabled = false;
        document.getElementById('pauseBtn').disabled = false;
        
        // 자동 재생
        playAudio();
      } else {
        log('⚠️ 01.mp3 없음. 파일을 업로드하세요.');
      }
    } catch(e) {
      log('⚠️ 01.mp3 없음. 파일을 업로드하세요.');
    }
    
    // 시작 화면 숨기기
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('controls').classList.add('visible');
    
  } catch(e) {
    log(`❌ 에러: ${e.message}`);
  }
});

// 오디오 재생
function playAudio() {
  if (!audioBuffer || !audioContext) {
    log('❌ 먼저 START 버튼을 누르세요!');
    return;
  }
  
  try {
    // 기존 소스 정지
    if (currentSource) {
      currentSource.stop();
      currentSource.disconnect();
    }
    
    // 새 소스 생성
    currentSource = audioContext.createBufferSource();
    currentSource.buffer = audioBuffer;
    currentSource.loop = true;
    currentSource.connect(analyser);
    analyser.connect(audioContext.destination);
    
    // Resume (suspended 상태일 수 있음)
    if (audioContext.state === 'suspended') {
      audioContext.resume();
    }
    
    currentSource.start(0);
    isPlaying = true;
    
    log('🎵 재생 중!');
    
  } catch(e) {
    log(`❌ 재생 실패: ${e.message}`);
  }
}

// 일시정지
function pauseAudio() {
  if (currentSource) {
    currentSource.stop();
    currentSource = null;
    isPlaying = false;
    log('⏸ 일시정지');
  }
}

// 사용자 파일 로드
async function loadCustomFile(file) {
  if (!audioContext) {
    log('❌ 먼저 START 버튼을 누르세요!');
    return;
  }
  
  try {
    log(`📂 ${file.name} 로딩 중...`);
    
    const arrayBuffer = await file.arrayBuffer();
    audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
    
    log(`✅ ${file.name} 로드 완료! (${Math.round(audioBuffer.duration)}초)`);
    
    document.getElementById('playBtn').disabled = false;
    document.getElementById('pauseBtn').disabled = false;
    
    // 자동 재생
    playAudio();
    
  } catch(e) {
    log(`❌ 로드 실패: ${e.message}`);
  }
}

// 이벤트 리스너
document.getElementById('playBtn').addEventListener('click', playAudio);
document.getElementById('pauseBtn').addEventListener('click', pauseAudio);

const fileInput = document.getElementById('fileInput');
const uploadArea = document.getElementById('uploadArea');

uploadArea.addEventListener('click', () => {
  if (!audioContext) {
    log('❌ 먼저 START 버튼을 누르세요!');
    return;
  }
  fileInput.click();
});

fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) loadCustomFile(e.target.files[0]);
});

uploadArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadArea.style.background = 'rgba(0,255,255,0.3)';
});

uploadArea.addEventListener('dragleave', () => {
  uploadArea.style.background = 'rgba(0,255,255,0.05)';
});

uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.style.background = 'rgba(0,255,255,0.05)';
  
  if (!audioContext) {
    log('❌ 먼저 START 버튼을 누르세요!');
    return;
  }
  
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('audio/')) {
    loadCustomFile(file);
  } else {
    log('❌ 오디오 파일만 가능합니다');
  }
});

// 3D 오브젝트
const sphereGeo = new THREE.IcosahedronGeometry(15, 4);
const sphereMat = new THREE.MeshPhongMaterial({
  color: 0x00ffff,
  flatShading: true,
  emissive: 0x072534,
  shininess: 100
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
scene.add(sphere);

const wireGeo = new THREE.IcosahedronGeometry(15.5, 4);
const wireMat = new THREE.MeshBasicMaterial({
  color: 0xff00ff,
  wireframe: true,
  transparent: true,
  opacity: 0.3
});
const wire = new THREE.Mesh(wireGeo, wireMat);
scene.add(wire);

// 파티클 링
const particles = [];
for(let i = 0; i < 3; i++) {
  const pos = new Float32Array(200 * 3);
  const r = 25 + i * 10;
  for(let j = 0; j < 200; j++) {
    const a = (j/200) * Math.PI * 2;
    pos[j*3] = Math.cos(a) * r;
    pos[j*3+1] = (Math.random()-0.5) * 5;
    pos[j*3+2] = Math.sin(a) * r;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.5,
    color: new THREE.Color().setHSL(i/3, 1, 0.5),
    blending: THREE.AdditiveBlending,
    transparent: true
  });
  const p = new THREE.Points(geo, mat);
  particles.push(p);
  scene.add(p);
}

// 조명
const light = new THREE.PointLight(0xffffff, 1.5, 100);
light.position.set(0, 0, 30);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040, 0.5));

// 애니메이션
let time = 0;
const origVerts = sphereGeo.attributes.position.array.slice();

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;
  
  if (isPlaying && analyser && dataArray) {
    analyser.getByteFrequencyData(dataArray);
    
    const bass = dataArray.slice(0,10).reduce((a,b)=>a+b)/10;
    const mid = dataArray.slice(10,50).reduce((a,b)=>a+b)/40;
    const treble = dataArray.slice(50,100).reduce((a,b)=>a+b)/50;
    
    // 구체 변형
    const verts = sphere.geometry.attributes.position.array;
    for(let i = 0; i < verts.length; i += 3) {
      const x = origVerts[i];
      const y = origVerts[i+1];
      const z = origVerts[i+2];
      const d = Math.sqrt(x*x + y*y + z*z);
      const offset = bass/255 * 5;
      verts[i] = x + (x/d) * offset;
      verts[i+1] = y + (y/d) * offset;
      verts[i+2] = z + (z/d) * offset;
    }
    sphere.geometry.attributes.position.needsUpdate = true;
    
    // 색상
    const hue = (time*0.1 + mid/255) % 1;
    sphereMat.color.setHSL(hue, 1, 0.5);
    sphereMat.emissive.setHSL(hue, 1, 0.2);
    
    // 와이어프레임
    wire.rotation.x = time * 0.5;
    wire.rotation.y = time * 0.3;
    wire.scale.setScalar(1 + treble/255 * 0.3);
    
    // 파티클
    particles.forEach((p, i) => {
      p.rotation.y = time * (0.2 + i*0.1);
      p.material.size = 0.5 + (dataArray[i*30]/255) * 2;
      const h = (time*0.05 + i/3) % 1;
      p.material.color.setHSL(h, 1, 0.5);
    });
    
    light.intensity = 1.5 + bass/255 * 2;
    light.color.setHSL((time*0.1) % 1, 1, 0.5);
    
  } else {
    // 기본 애니메이션
    sphere.rotation.y += 0.005;
    wire.rotation.x += 0.002;
    wire.rotation.y += 0.003;
    
    const hue = (time*0.05) % 1;
    sphereMat.color.setHSL(hue, 1, 0.5);
  }
  
  controls.update();
  renderer.render(scene, camera);
}

animate();

// 반응형
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
