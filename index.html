<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQUA DIGITAL NATURE - Texture Fixed</title>
  <link rel="icon" href="data:,">

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #98D8C8 100%);
      font-family: 'Quicksand', sans-serif;
      color: #fff;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.15"/></svg>');
      pointer-events: none;
      z-index: 999;
      mix-blend-mode: overlay;
    }

    #startScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #startScreen.hidden {
      display: none;
    }

    .title {
      font-size: 80px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #fff;
      margin-bottom: 15px;
      text-transform: uppercase;
      text-shadow: 0 4px 20px rgba(0,0,0,0.2);
      text-align: center;
    }

    .subtitle {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 6px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 50px;
      text-transform: uppercase;
      text-align: center;
    }

    #startBtn {
      padding: 18px 50px;
      font-size: 16px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.6);
      color: #fff;
      cursor: pointer;
      letter-spacing: 3px;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
      border-radius: 40px;
      transition: all 0.3s;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    #startBtn:hover {
      background: rgba(255,255,255,0.35);
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.25);
    }

    #controls {
      position: fixed;
      top: 25px;
      left: 25px;
      z-index: 1001;
      background: rgba(255,255,255,0.2);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      display: none;
      max-width: 320px;
      max-height: 90vh;
      overflow-y: auto;
    }

    #controls.visible {
      display: block;
    }

    #controls::-webkit-scrollbar {
      width: 6px;
    }

    #controls::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
    }

    #controls::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.4);
      border-radius: 3px;
    }

    .control-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.8);
      margin-top: 15px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      font-family: 'Quicksand', sans-serif;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.5);
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      transition: all 0.2s;
    }

    button:hover {
      background: rgba(255,255,255,0.4);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255,255,255,0.3);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button:active {
      transform: translateY(0);
    }

    #status {
      margin-top: 12px;
      padding: 12px;
      background: rgba(0,0,0,0.15);
      border-radius: 10px;
      font-size: 10px;
      color: rgba(255,255,255,0.95);
      max-height: 120px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      line-height: 1.5;
    }

    #status::-webkit-scrollbar {
      width: 5px;
    }

    #status::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
    }

    #status::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.4);
      border-radius: 3px;
    }

    .file-input {
      display: none;
    }

    .model-list {
      margin-top: 10px;
    }

    .model-item {
      padding: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .model-item-info {
      flex: 1;
      min-width: 0;
    }

    .model-item-name {
      font-weight: 600;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .model-item-size {
      opacity: 0.8;
      font-size: 9px;
    }

    .model-item-remove {
      padding: 6px 12px;
      font-size: 9px;
      flex-shrink: 0;
    }

    .camera-controls {
      margin-top: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 10px;
    }

    .camera-controls label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .camera-controls input[type="checkbox"] {
      cursor: pointer;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

  <div id="startScreen">
    <div class="title">AQUA DIGITAL</div>
    <div class="subtitle">Texture Fixed Version</div>
    <button id="startBtn">Enter</button>
  </div>

  <div id="controls">
    <div class="control-title">Control Panel</div>

    <div class="section-title">🎵 Audio</div>
    <div class="btn-group">
      <button id="playTestBtn">▶ Test</button>
      <button id="stopBtn">■ Stop</button>
    </div>

    <div class="btn-group">
      <button id="uploadAudioBtn">+ Audio File</button>
    </div>

    <div class="section-title">🎨 3D Models</div>
    <div class="btn-group">
      <button id="upload3DBtn">+ Add GLB/GLTF</button>
      <button id="removeAllBtn" disabled>✕ Remove All</button>
    </div>

    <div id="modelList" class="model-list"></div>

    <div class="section-title">📷 Camera</div>
    <div class="camera-controls">
      <label>
        <input type="checkbox" id="autoRotateToggle">
        Auto Rotate
      </label>
    </div>

    <input type="file" id="audioInput" class="file-input" accept="audio/*">
    <input type="file" id="modelInput" class="file-input" accept=".glb,.gltf,model/gltf-binary,model/gltf+json" multiple>

    <div id="status">> Ready...</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    function log(msg) {
      const status = document.getElementById('status');
      const time = new Date().toLocaleTimeString();
      status.innerHTML += `<div>> [${time}] ${msg}</div>`;
      status.scrollTop = status.scrollHeight;
    }

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x87CEEB, 80, 250);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 20, 100);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x87CEEB, 1);
    
    // 🔥 텍스처 인코딩 설정
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 30;
    controls.maxDistance = 200;
    controls.maxPolarAngle = Math.PI / 1.5;
    controls.autoRotate = false;
    controls.autoRotateSpeed = 0.5;

    const gltfLoader = new GLTFLoader();
    const customModels = [];
    let modelIdCounter = 0;

    const globeGeo = new THREE.SphereGeometry(18, 64, 64);
    const globeMat = new THREE.MeshPhysicalMaterial({
      color: 0x4A90E2,
      transparent: true,
      opacity: 0.4,
      metalness: 0.1,
      roughness: 0.1,
      transmission: 0.8,
      thickness: 1.5,
      clearcoat: 1,
      clearcoatRoughness: 0.1
    });
    const globe = new THREE.Mesh(globeGeo, globeMat);
    scene.add(globe);

    const coreGeo = new THREE.SphereGeometry(12, 32, 32);
    const coreMat = new THREE.MeshStandardMaterial({
      color: 0x98D8C8,
      emissive: 0x98D8C8,
      emissiveIntensity: 0.4,
      transparent: true,
      opacity: 0.6
    });
    const core = new THREE.Mesh(coreGeo, coreMat);
    scene.add(core);

    const waterDrops = [];
    const dropCount = 60;
    for (let i = 0; i < dropCount; i++) {
      const size = Math.random() * 2 + 1;
      const geo = new THREE.SphereGeometry(size, 16, 16);
      const mat = new THREE.MeshPhysicalMaterial({
        color: 0x4FC3F7,
        transparent: true,
        opacity: 0.7,
        metalness: 0.2,
        roughness: 0.1,
        transmission: 0.9,
        thickness: 0.5
      });

      const drop = new THREE.Mesh(geo, mat);

      const angle = (i / dropCount) * Math.PI * 2;
      const radius = 35 + Math.random() * 15;
      drop.position.x = Math.cos(angle) * radius;
      drop.position.z = Math.sin(angle) * radius;
      drop.position.y = (Math.random() - 0.5) * 30;

      waterDrops.push({
        mesh: drop,
        angle,
        radius,
        speed: Math.random() * 0.02 + 0.01,
        offset: Math.random() * Math.PI * 2
      });

      scene.add(drop);
    }

    const butterflies = [];
    for (let i = 0; i < 15; i++) {
      const group = new THREE.Group();

      const wingGeo = new THREE.ConeGeometry(1.5, 3, 8);
      const hue = Math.random() * 0.15 + 0.05;
      const wingMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color().setHSL(hue, 0.8, 0.6),
        emissive: new THREE.Color().setHSL(hue, 0.8, 0.5),
        emissiveIntensity: 0.3
      });

      const leftWing = new THREE.Mesh(wingGeo, wingMat);
      leftWing.rotation.z = Math.PI / 2;
      leftWing.position.x = -1;

      const rightWing = new THREE.Mesh(wingGeo, wingMat.clone());
      rightWing.rotation.z = -Math.PI / 2;
      rightWing.position.x = 1;

      group.add(leftWing, rightWing);

      group.position.set(
        (Math.random() - 0.5) * 80,
        Math.random() * 40 + 10,
        (Math.random() - 0.5) * 80
      );

      butterflies.push({
        group,
        speed: Math.random() * 0.02 + 0.01,
        offset: Math.random() * Math.PI * 2,
        leftWing,
        rightWing
      });

      scene.add(group);
    }

    const waterGeo = new THREE.PlaneGeometry(200, 200, 50, 50);
    const waterMat = new THREE.MeshStandardMaterial({
      color: 0x4FC3F7,
      transparent: true,
      opacity: 0.4,
      metalness: 0.3,
      roughness: 0.2,
      side: THREE.DoubleSide
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI / 2;
    water.position.y = -30;
    scene.add(water);

    const waterPositions = waterGeo.attributes.position;

    const cloudParticles = [];
    for (let i = 0; i < 20; i++) {
      const cloudGeo = new THREE.SphereGeometry(5, 8, 8);
      const cloudMat = new THREE.MeshStandardMaterial({
        color: 0xFFFFFF,
        transparent: true,
        opacity: 0.6
      });
      const cloud = new THREE.Mesh(cloudGeo, cloudMat);
      cloud.position.set(
        (Math.random() - 0.5) * 150,
        Math.random() * 40 + 30,
        (Math.random() - 0.5) * 150
      );
      cloudParticles.push(cloud);
      scene.add(cloud);
    }

    const starCount = 1500;
    const starGeo = new THREE.BufferGeometry();
    const starPositions = new Float32Array(starCount * 3);
    const starColors = new Float32Array(starCount * 3);

    for (let i = 0; i < starCount; i++) {
      starPositions[i * 3] = (Math.random() - 0.5) * 400;
      starPositions[i * 3 + 1] = (Math.random() - 0.5) * 400;
      starPositions[i * 3 + 2] = (Math.random() - 0.5) * 400;

      const color = new THREE.Color().setHSL(Math.random() * 0.3 + 0.5, 0.5, 0.8);
      starColors[i * 3] = color.r;
      starColors[i * 3 + 1] = color.g;
      starColors[i * 3 + 2] = color.b;
    }

    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

    const starMat = new THREE.PointsMaterial({
      size: 1.2,
      vertexColors: true,
      transparent: true,
      opacity: 0.7,
      blending: THREE.AdditiveBlending
    });

    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // 🔥 조명 강화
    const sunLight = new THREE.DirectionalLight(0xFFFFFF, 2.5);
    sunLight.position.set(50, 50, 50);
    scene.add(sunLight);

    const skyLight = new THREE.HemisphereLight(0xFFFFFF, 0x98D8C8, 1.5);
    scene.add(skyLight);

    const pointLight1 = new THREE.PointLight(0xFFFFFF, 3, 150);
    pointLight1.position.set(30, 40, 30);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0xFFFFFF, 3, 150);
    pointLight2.position.set(-30, 40, -30);
    scene.add(pointLight2);

    const ambientLight = new THREE.AmbientLight(0xFFFFFF, 1.2);
    scene.add(ambientLight);

    const modelSpotLight = new THREE.SpotLight(0xFFFFFF, 4);
    modelSpotLight.position.set(0, 80, 0);
    modelSpotLight.angle = Math.PI / 3;
    modelSpotLight.penumbra = 0.3;
    modelSpotLight.decay = 1;
    modelSpotLight.distance = 200;
    scene.add(modelSpotLight);

    function disposeHierarchy(object) {
      object.traverse((child) => {
        if (child.geometry) child.geometry.dispose();

        if (child.material) {
          if (Array.isArray(child.material)) {
            child.material.forEach((mat) => mat.dispose && mat.dispose());
          } else if (child.material.dispose) {
            child.material.dispose();
          }
        }
      });
    }

    // 🔥 텍스처 수정 함수
    function fixTextures(model) {
      model.traverse((child) => {
        if (child.isMesh) {
          const materials = Array.isArray(child.material) ? child.material : [child.material];
          
          materials.forEach((mat) => {
            if (mat.map) {
              mat.map.colorSpace = THREE.SRGBColorSpace;
              mat.map.needsUpdate = true;
            }
            
            if (mat.emissiveMap) {
              mat.emissiveMap.colorSpace = THREE.SRGBColorSpace;
              mat.emissiveMap.needsUpdate = true;
            }
            
            if (mat.normalMap) {
              mat.normalMap.colorSpace = THREE.LinearSRGBColorSpace;
              mat.normalMap.needsUpdate = true;
            }
            
            if (mat.roughnessMap) {
              mat.roughnessMap.colorSpace = THREE.LinearSRGBColorSpace;
              mat.roughnessMap.needsUpdate = true;
            }
            
            if (mat.metalnessMap) {
              mat.metalnessMap.colorSpace = THREE.LinearSRGBColorSpace;
              mat.metalnessMap.needsUpdate = true;
            }
            
            mat.needsUpdate = true;
            child.castShadow = true;
            child.receiveShadow = true;
          });
        }
      });
    }

    function updateModelListUI() {
      const listEl = document.getElementById('modelList');
      listEl.innerHTML = '';

      if (customModels.length === 0) {
        document.getElementById('removeAllBtn').disabled = true;
        return;
      }

      document.getElementById('removeAllBtn').disabled = false;

      customModels.forEach((modelData) => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'model-item';

        const infoDiv = document.createElement('div');
        infoDiv.className = 'model-item-info';

        const nameDiv = document.createElement('div');
        nameDiv.className = 'model-item-name';
        nameDiv.textContent = `📦 ${modelData.name}`;

        const sizeDiv = document.createElement('div');
        sizeDiv.className = 'model-item-size';
        sizeDiv.textContent = `Size: ${modelData.sizeText}`;

        infoDiv.appendChild(nameDiv);
        infoDiv.appendChild(sizeDiv);

        const removeBtn = document.createElement('button');
        removeBtn.className = 'model-item-remove';
        removeBtn.textContent = '✕';
        removeBtn.onclick = () => removeModel(modelData.id);

        itemDiv.appendChild(infoDiv);
        itemDiv.appendChild(removeBtn);

        listEl.appendChild(itemDiv);
      });
    }

    function load3DModel(file) {
      log(`Loading 3D model: ${file.name}`);

      const reader = new FileReader();

      reader.onload = function(e) {
        const arrayBuffer = e.target.result;

        gltfLoader.parse(
          arrayBuffer,
          '',
          function(gltf) {
            const model = gltf.scene;
            const id = modelIdCounter++;

            // 🔥 텍스처 수정 적용
            fixTextures(model);

            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z) || 1;
            const baseScale = 30 / maxDim;

            model.scale.setScalar(baseScale);

            box.setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);

            const angle = (customModels.length / 5) * Math.PI * 2;
            const radius = 50;
            const baseX = Math.cos(angle) * radius;
            const baseZ = Math.sin(angle) * radius;
            const baseY = 30 + customModels.length * 15;

            model.position.x += baseX;
            model.position.y += baseY;
            model.position.z += baseZ;

            scene.add(model);

            const modelData = {
              id,
              name: file.name,
              model,
              baseScale,
              baseX,
              baseY,
              baseZ,
              rotationSpeed: 0.005 + Math.random() * 0.01,
              floatOffset: Math.random() * Math.PI * 2,
              sizeText: `${size.x.toFixed(1)} × ${size.y.toFixed(1)} × ${size.z.toFixed(1)}`
            };

            customModels.push(modelData);

            log(`✓ Model loaded: ${file.name}`);
            log(`  Textures fixed & optimized`);

            updateModelListUI();
          },
          function(error) {
            log(`✗ Error loading model: ${error?.message || error}`);
          }
        );
      };

      reader.readAsArrayBuffer(file);
    }

    function removeModel(id) {
      const index = customModels.findIndex(m => m.id === id);
      if (index === -1) return;

      const modelData = customModels[index];
      scene.remove(modelData.model);
      disposeHierarchy(modelData.model);

      customModels.splice(index, 1);

      log(`✓ Model removed: ${modelData.name}`);
      updateModelListUI();
    }

    function removeAllModels() {
      customModels.forEach((modelData) => {
        scene.remove(modelData.model);
        disposeHierarchy(modelData.model);
      });

      customModels.length = 0;

      log('✓ All models removed');
      updateModelListUI();
    }

    let audioContext, analyser, dataArray, currentSource;
    let isPlaying = false;

    document.getElementById('startBtn').addEventListener('click', async function() {
      log('Initializing audio context...');

      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        log('✓ Audio ready');
        log('✓ OrbitControls enabled');
        log('✓ Texture system optimized');

        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('controls').classList.add('visible');
      } catch (e) {
        log(`✗ Error: ${e.message}`);
      }
    });

    document.getElementById('playTestBtn').addEventListener('click', async function() {
      log('Playing test tone...');

      if (!audioContext || !analyser) return;

      try {
        if (currentSource) {
          try { currentSource.stop(); } catch (_) {}
          currentSource.disconnect();
        }

        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();

        osc.connect(gain);
        gain.connect(analyser);
        analyser.connect(audioContext.destination);

        osc.frequency.value = 440;
        gain.gain.value = 0.3;
        osc.type = 'sine';

        osc.start();
        currentSource = osc;
        isPlaying = true;

        log('▶ Playing');

        setTimeout(() => {
          if (currentSource === osc) {
            try { osc.stop(); } catch (_) {}
            currentSource = null;
            isPlaying = false;
            log('■ Stopped');
          }
        }, 3000);
      } catch (e) {
        log(`✗ Error: ${e.message}`);
      }
    });

    document.getElementById('stopBtn').addEventListener('click', function() {
      if (currentSource) {
        try { currentSource.stop(); } catch (_) {}
        try { currentSource.disconnect(); } catch (_) {}
        currentSource = null;
      }
      isPlaying = false;
      log('■ Stopped');
    });

    document.getElementById('uploadAudioBtn').addEventListener('click', function() {
      document.getElementById('audioInput').click();
    });

    document.getElementById('audioInput').addEventListener('change', async function(e) {
      const file = e.target.files[0];
      if (!file) return;

      log(`Loading audio: ${file.name}`);

      if (!audioContext || !analyser) {
        log('✗ Audio context not initialized');
        return;
      }

      try {
        const arrayBuffer = await file.arrayBuffer();
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

        log(`✓ Audio loaded (${Math.round(audioBuffer.duration)}s)`);

        if (currentSource) {
          try { currentSource.stop(); } catch (_) {}
          try { currentSource.disconnect(); } catch (_) {}
        }

        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        source.loop = true;
        source.connect(analyser);
        analyser.connect(audioContext.destination);
        source.start(0);

        currentSource = source;
        isPlaying = true;

        log('▶ Playing');
      } catch (e) {
        log(`✗ Error: ${e.message}`);
      }
    });

    document.getElementById('upload3DBtn').addEventListener('click', function() {
      document.getElementById('modelInput').click();
    });

    document.getElementById('modelInput').addEventListener('change', function(e) {
      const files = Array.from(e.target.files);
      if (files.length === 0) return;

      files.forEach(file => load3DModel(file));

      e.target.value = '';
    });

    document.getElementById('removeAllBtn').addEventListener('click', function() {
      if (confirm('Remove all models?')) {
        removeAllModels();
      }
    });

    document.getElementById('autoRotateToggle').addEventListener('change', function(e) {
      controls.autoRotate = e.target.checked;
      log(controls.autoRotate ? '✓ Auto rotate ON' : '✓ Auto rotate OFF');
    });

    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      controls.update();

      let bass = 0;
      let mid = 0;
      let treble = 0;

      if (isPlaying && analyser && dataArray) {
        analyser.getByteFrequencyData(dataArray);

        bass = dataArray.slice(0, 30).reduce((a, b) => a + b, 0) / 30;
        mid = dataArray.slice(30, 80).reduce((a, b) => a + b, 0) / 50;
        treble = dataArray.slice(80, 128).reduce((a, b) => a + b, 0) / 48;
      }

      const bassNorm = bass / 255;
      const midNorm = mid / 255;
      const trebleNorm = treble / 255;

      const globeScale = 1 + bassNorm * 0.3;
      globe.scale.setScalar(globeScale);
      globe.rotation.y += 0.002;
      globeMat.opacity = 0.3 + bassNorm * 0.2;

      const coreScale = 1 + midNorm * 0.4;
      core.scale.setScalar(coreScale);
      core.rotation.x += 0.003;
      core.rotation.y -= 0.002;
      coreMat.emissiveIntensity = 0.4 + midNorm * 0.6;

      customModels.forEach((modelData, index) => {
        const model = modelData.model;

        model.rotation.y += modelData.rotationSpeed;
        model.rotation.x = Math.sin(time + modelData.floatOffset) * 0.2;

        const modelScale = modelData.baseScale * (1 + bassNorm * 0.3);
        model.scale.setScalar(modelScale);

        const floatY = Math.sin(time * 2 + modelData.floatOffset) * 5 + midNorm * 10;
        model.position.y = modelData.baseY + floatY;

        const orbitAngle = time * 0.1 + (index / customModels.length) * Math.PI * 2;
        const orbitRadius = 50 + Math.sin(time + index) * 10;
        model.position.x = Math.cos(orbitAngle) * orbitRadius;
        model.position.z = Math.sin(orbitAngle) * orbitRadius;
      });

      waterDrops.forEach((item, i) => {
        const idx = Math.min(dataArray ? Math.floor((i / waterDrops.length) * dataArray.length) : 0, 127);
        const value = dataArray ? dataArray[idx] / 255 : 0;

        item.mesh.position.y = Math.sin(time * 2 + item.offset) * 15 + value * 10;
        item.mesh.scale.setScalar(1 + value * 1.5);

        item.mesh.position.x = Math.cos(time * item.speed + item.offset + item.angle) * item.radius;
        item.mesh.position.z = Math.sin(time * item.speed + item.offset + item.angle) * item.radius;

        item.mesh.material.opacity = 0.5 + value * 0.4;
      });

      butterflies.forEach((item, i) => {
        const freqIndex = Math.min(i * 8, 127);
        const freqValue = dataArray ? dataArray[freqIndex] / 255 : 0;

        item.group.position.y += Math.sin(time * 3 + item.offset) * 0.03;
        item.group.position.x += Math.cos(time * item.speed + item.offset) * 0.05;
        item.group.position.z += Math.sin(time * item.speed + item.offset) * 0.05;
        item.group.rotation.y += 0.02;

        const wingAngle = Math.sin(time * 10) * 0.5;
        item.leftWing.rotation.y = wingAngle;
        item.rightWing.rotation.y = -wingAngle;

        item.group.scale.setScalar(1 + freqValue * 0.3);
      });

      for (let i = 0; i < waterPositions.count; i++) {
        const x = waterPositions.getX(i);
        const y = waterPositions.getY(i);
        const wave = Math.sin(x * 0.1 + time * 2) * Math.cos(y * 0.1 + time * 2) * (0.5 + bassNorm * 3);
        waterPositions.setZ(i, wave);
      }
      waterPositions.needsUpdate = true;

      cloudParticles.forEach((cloud) => {
        cloud.position.x += 0.02;
        if (cloud.position.x > 100) cloud.position.x = -100;
        cloud.material.opacity = 0.4 + trebleNorm * 0.3;
      });

      stars.rotation.y += 0.0002;
      starMat.opacity = 0.5 + trebleNorm * 0.4;

      pointLight1.intensity = 2 + bassNorm * 2;
      pointLight2.intensity = 2 + midNorm * 2;

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
    log('✓ Scene initialized');
    log('Click ENTER to begin');
  </script>
</body>
</html>
