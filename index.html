<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Audio Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #000; 
      font-family: Arial, sans-serif;
    }
    
    #startScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #000 0%, #1a0033 50%, #000033 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #startScreen.hidden { display: none; }
    
    .start-title {
      font-size: 48px;
      color: #00ffff;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(0,255,255,0.8);
    }
    
    #startBtn {
      padding: 20px 60px;
      font-size: 24px;
      background: linear-gradient(135deg, rgba(0,255,255,0.3), rgba(255,0,255,0.3));
      border: 3px solid #00ffff;
      color: white;
      cursor: pointer;
      border-radius: 50px;
      font-weight: bold;
      box-shadow: 0 0 30px rgba(0,255,255,0.5);
    }
    #startBtn:hover {
      transform: scale(1.1);
    }
    
    #controls {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 100;
      color: white;
      background: rgba(0,0,0,0.85);
      padding: 20px;
      border-radius: 15px;
      border: 2px solid #00ffff;
      display: none;
    }
    #controls.visible { display: block; }
    
    button {
      padding: 10px 20px;
      margin: 5px;
      background: rgba(0,255,255,0.2);
      border: 2px solid #00ffff;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
    }
    button:hover {
      background: rgba(0,255,255,0.4);
    }
    
    #status {
      margin-top: 10px;
      padding: 10px;
      background: rgba(0,0,0,0.5);
      border-radius: 5px;
      font-size: 12px;
      color: #00ffff;
      max-height: 150px;
      overflow-y: auto;
    }
    
    #fileInput { display: none; }
  </style>
</head>
<body>

<div id="startScreen">
  <div class="start-title">🎵 Audio Visualizer</div>
  <button id="startBtn">🎧 START</button>
</div>

<div id="controls">
  <div style="font-size: 18px; margin-bottom: 10px; color: #00ffff;">🎵 Controls</div>
  
  <div>
    <button id="playTestBtn">▶ 테스트 사운드</button>
    <button id="stopBtn">⏹ 정지</button>
  </div>
  
  <div style="margin-top: 10px;">
    <button id="uploadBtn">📁 음악 파일 선택</button>
    <input type="file" id="fileInput" accept="audio/*">
  </div>
  
  <div id="status">준비 중...</div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';

console.log('✅ 스크립트 로드됨!');

// 로그 함수
function log(msg) {
  const status = document.getElementById('status');
  status.innerHTML += `<div>${msg}</div>`;
  status.scrollTop = status.scrollHeight;
  console.log(msg);
}

// 씬 설정
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 30;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 3D 오브젝트
// 기존 3D 오브젝트 부분을 이걸로 교체:

// 파티클 시스템
const particleCount = 5000;
const particles = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);

for(let i = 0; i < particleCount * 3; i += 3) {
  // 구 형태로 배치
  const radius = 15;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  
  positions[i] = radius * Math.sin(phi) * Math.cos(theta);
  positions[i+1] = radius * Math.sin(phi) * Math.sin(theta);
  positions[i+2] = radius * Math.cos(phi);
  
  colors[i] = Math.random();
  colors[i+1] = Math.random();
  colors[i+2] = Math.random();
}

particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const particleMaterial = new THREE.PointsMaterial({
  size: 0.3,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  transparent: true,
  opacity: 0.8
});

const particleSystem = new THREE.Points(particles, particleMaterial);
scene.add(particleSystem);

// 애니메이션 부분도 교체:
function animate() {
  requestAnimationFrame(animate);
  time += 0.01;
  
  if (isPlaying && analyser && dataArray) {
    analyser.getByteFrequencyData(dataArray);
    
    const avg = dataArray.reduce((a,b) => a+b) / dataArray.length;
    const bass = dataArray.slice(0, 50).reduce((a,b) => a+b) / 50;
    
    // 파티클 확장/수축
    const positions = particleSystem.geometry.attributes.position.array;
    const colors = particleSystem.geometry.attributes.color.array;
    
    for(let i = 0; i < positions.length; i += 3) {
      const x = positions[i];
      const y = positions[i+1];
      const z = positions[i+2];
      const distance = Math.sqrt(x*x + y*y + z*z);
      
      // 베이스에 반응해서 확장
      const scale = 1 + (bass / 255) * 2;
      positions[i] = (x / distance) * distance * scale;
      positions[i+1] = (y / distance) * distance * scale;
      positions[i+2] = (z / distance) * distance * scale;
      
      // 색상 변화
      const hue = (time * 0.1 + avg / 255) % 1;
      const color = new THREE.Color().setHSL(hue, 1, 0.5);
      colors[i] = color.r;
      colors[i+1] = color.g;
      colors[i+2] = color.b;
    }
    
    particleSystem.geometry.attributes.position.needsUpdate = true;
    particleSystem.geometry.attributes.color.needsUpdate = true;
    particleSystem.rotation.y += 0.002;
    
    // 파티클 크기 변화
    particleMaterial.size = 0.3 + (avg / 255) * 2;
    
  } else {
    particleSystem.rotation.y += 0.001;
  }
  
  renderer.render(scene, camera);
}

// 오디오 변수
let audioContext, analyser, dataArray, currentSource;
let isPlaying = false;

// START 버튼
document.getElementById('startBtn').addEventListener('click', function() {
  console.log('✅ START 버튼 클릭됨!');
  log('🎵 START 버튼 클릭됨!');
  
  try {
    // AudioContext 생성
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    
    log('✅ AudioContext 생성 완료!');
    log(`📊 AudioContext 상태: ${audioContext.state}`);
    
    // 화면 전환
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('controls').classList.add('visible');
    
    log('✅ 준비 완료! 테스트 사운드 버튼을 눌러보세요!');
    
  } catch(e) {
    log(`❌ 에러: ${e.message}`);
    console.error(e);
  }
});

// 테스트 사운드 (비프음)
document.getElementById('playTestBtn').addEventListener('click', function() {
  console.log('✅ 테스트 사운드 버튼 클릭됨!');
  log('🔊 테스트 사운드 재생 시도...');
  
  if (!audioContext) {
    log('❌ AudioContext가 없습니다!');
    return;
  }
  
  try {
    // 기존 소스 정지
    if (currentSource) {
      currentSource.stop();
      currentSource.disconnect();
    }
    
    // Oscillator로 비프음 생성
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(analyser);
    analyser.connect(audioContext.destination);
    
    oscillator.frequency.value = 440; // A4 음
    gainNode.gain.value = 0.3;
    
    oscillator.type = 'sine';
    
    // Resume (suspended 상태일 수 있음)
    if (audioContext.state === 'suspended') {
      audioContext.resume().then(() => {
        log('✅ AudioContext resumed!');
      });
    }
    
    oscillator.start();
    currentSource = oscillator;
    isPlaying = true;
    
    log('🎵 테스트 사운드 재생 중! (삐- 소리 들리나요?)');
    log(`📊 AudioContext 상태: ${audioContext.state}`);
    
    // 3초 후 자동 정지
    setTimeout(() => {
      if (oscillator) {
        oscillator.stop();
        log('⏹ 테스트 사운드 종료');
      }
    }, 3000);
    
  } catch(e) {
    log(`❌ 재생 실패: ${e.message}`);
    console.error(e);
  }
});

// 정지 버튼
document.getElementById('stopBtn').addEventListener('click', function() {
  if (currentSource) {
    currentSource.stop();
    currentSource = null;
    isPlaying = false;
    log('⏹ 정지됨');
  }
});

// 파일 업로드
document.getElementById('uploadBtn').addEventListener('click', function() {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  log(`📂 파일 로딩: ${file.name}`);
  
  if (!audioContext) {
    log('❌ 먼저 START 버튼을 눌러주세요!');
    return;
  }
  
  try {
    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
    
    log(`✅ 파일 로드 완료! (${Math.round(audioBuffer.duration)}초)`);
    
    // 기존 소스 정지
    if (currentSource) {
      currentSource.stop();
      currentSource.disconnect();
    }
    
    // 새 소스 생성
    const source = audioContext.createBufferSource();
    source.buffer = audioBuffer;
    source.loop = true;
    source.connect(analyser);
    analyser.connect(audioContext.destination);
    
    if (audioContext.state === 'suspended') {
      await audioContext.resume();
    }
    
    source.start(0);
    currentSource = source;
    isPlaying = true;
    
    log('🎵 재생 중!');
    
  } catch(e) {
    log(`❌ 로드 실패: ${e.message}`);
    console.error(e);
  }
});

// 애니메이션
let time = 0;
const originalVerts = geometry.attributes.position.array.slice();

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;
  
  if (isPlaying && analyser && dataArray) {
    analyser.getByteFrequencyData(dataArray);
    
    const avg = dataArray.reduce((a,b) => a+b) / dataArray.length;
    
    // 구체 변형
    const verts = sphere.geometry.attributes.position.array;
    for(let i = 0; i < verts.length; i += 3) {
      const x = originalVerts[i];
      const y = originalVerts[i+1];
      const z = originalVerts[i+2];
      const d = Math.sqrt(x*x + y*y + z*z);
      const offset = avg/255 * 3;
      verts[i] = x + (x/d) * offset;
      verts[i+1] = y + (y/d) * offset;
      verts[i+2] = z + (z/d) * offset;
    }
    sphere.geometry.attributes.position.needsUpdate = true;
    
    // 색상
    const hue = (time*0.1 + avg/255) % 1;
    material.color.setHSL(hue, 1, 0.5);
    
    sphere.rotation.y += 0.01;
    
  } else {
    sphere.rotation.y += 0.005;
    const hue = (time*0.05) % 1;
    material.color.setHSL(hue, 1, 0.5);
  }
  
  renderer.render(scene, camera);
}

animate();

// 반응형
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

log('✅ 스크립트 초기화 완료!');
console.log('✅ 모든 이벤트 리스너 등록 완료!');
</script>
</body>
</html>
