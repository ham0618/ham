<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRUTAL</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Archivo+Black&display=swap');
    
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body { 
      overflow: hidden; 
      background: #000;
      font-family: 'Space Grotesk', sans-serif;
      color: #fff;
      cursor: crosshair;
    }
    
    /* START 화면 */
    #startScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #startScreen.hidden { display: none; }
    
    .brutal-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: 180px;
      font-weight: 900;
      letter-spacing: -8px;
      color: #fff;
      line-height: 0.85;
      margin-bottom: 0;
      text-transform: uppercase;
    }
    
    .brutal-subtitle {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 12px;
      color: #fff;
      margin-top: 20px;
      margin-bottom: 80px;
      text-transform: uppercase;
    }
    
    #startBtn {
      padding: 30px 80px;
      font-size: 28px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      background: #fff;
      border: none;
      color: #000;
      cursor: pointer;
      letter-spacing: 4px;
      text-transform: uppercase;
      transition: all 0.15s;
      position: relative;
    }
    
    #startBtn:hover {
      background: #ff0000;
      color: #fff;
      transform: translate(-4px, -4px);
      box-shadow: 4px 4px 0 #fff;
    }
    
    #startBtn:active {
      transform: translate(0, 0);
      box-shadow: none;
    }
    
    /* 컨트롤 패널 */
    #controls {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 100;
      background: #fff;
      padding: 30px 40px;
      border-bottom: 8px solid #000;
      display: none;
    }
    #controls.visible { display: block; }
    
    .control-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      color: #000;
      margin-bottom: 20px;
      text-transform: uppercase;
    }
    
    .btn-group {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    
    button {
      padding: 15px 30px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      background: #000;
      border: 4px solid #000;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.1s;
    }
    
    button:hover {
      background: #ff0000;
      border-color: #ff0000;
      transform: translate(-2px, -2px);
      box-shadow: 2px 2px 0 #000;
    }
    
    button:active {
      transform: translate(0, 0);
      box-shadow: none;
    }
    
    #status {
      margin-top: 20px;
      padding: 20px;
      background: #000;
      border: 4px solid #000;
      font-size: 14px;
      color: #fff;
      max-height: 100px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      line-height: 1.8;
      letter-spacing: 1px;
    }
    
    #status::-webkit-scrollbar {
      width: 12px;
    }
    
    #status::-webkit-scrollbar-track {
      background: #fff;
    }
    
    #status::-webkit-scrollbar-thumb {
      background: #ff0000;
      border: 2px solid #fff;
    }
    
    #status div {
      margin-bottom: 5px;
    }
    
    #fileInput { display: none; }
    
    /* 강렬한 레드 액센트 */
    .accent {
      color: #ff0000;
    }
    
    /* 3D 캔버스 */
    canvas {
      display: block;
      background: #000;
    }
  </style>
</head>
<body>

<div id="startScreen">
  <div class="brutal-title">BRUTAL</div>
  <div class="brutal-subtitle">VISUALIZER</div>
  <button id="startBtn">START</button>
</div>

<div id="controls">
  <div class="control-title">CONTROL</div>
  
  <div class="btn-group">
    <button id="playTestBtn">▶ TEST</button>
    <button id="stopBtn">■ STOP</button>
    <button id="uploadBtn">+ LOAD</button>
  </div>
  
  <input type="file" id="fileInput" accept="audio/*">
  
  <div id="status">> READY</div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';

// 로그
function log(msg) {
  const status = document.getElementById('status');
  status.innerHTML += `<div>> ${msg}</div>`;
  status.scrollTop = status.scrollHeight;
}

// 씬
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 60;

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== 브루탈리즘 기하학 =====

// 1. 거대한 중앙 큐브 (흑백)
const mainCubeGeo = new THREE.BoxGeometry(20, 20, 20);
const mainCubeMat = new THREE.MeshBasicMaterial({ 
  color: 0xffffff,
  wireframe: false
});
const mainCube = new THREE.Mesh(mainCubeGeo, mainCubeMat);
scene.add(mainCube);

// 2. 와이어프레임 큐브 (레드)
const wireGeo = new THREE.BoxGeometry(25, 25, 25);
const wireMat = new THREE.MeshBasicMaterial({
  color: 0xff0000,
  wireframe: true
});
const wire = new THREE.Mesh(wireGeo, wireMat);
scene.add(wire);

// 3. 주파수 바 (각진 블록들)
const bars = [];
const barCount = 32;
for(let i = 0; i < barCount; i++) {
  const geo = new THREE.BoxGeometry(3, 1, 3);
  const mat = new THREE.MeshBasicMaterial({ 
    color: i % 4 === 0 ? 0xff0000 : 0xffffff
  });
  const bar = new THREE.Mesh(geo, mat);
  
  const angle = (i / barCount) * Math.PI * 2;
  const radius = 45;
  bar.position.x = Math.cos(angle) * radius;
  bar.position.z = Math.sin(angle) * radius;
  
  bars.push(bar);
  scene.add(bar);
}

// 4. 기하학적 형태들 (흑백 대비)
const shapes = [];
for(let i = 0; i < 8; i++) {
  let geo;
  if (i % 3 === 0) geo = new THREE.BoxGeometry(4, 4, 4);
  else if (i % 3 === 1) geo = new THREE.TetrahedronGeometry(3);
  else geo = new THREE.OctahedronGeometry(3);
  
  const mat = new THREE.MeshBasicMaterial({
    color: i % 2 === 0 ? 0xffffff : 0x000000,
    wireframe: i % 2 === 1
  });
  
  const shape = new THREE.Mesh(geo, mat);
  shape.position.set(
    (Math.random() - 0.5) * 80,
    (Math.random() - 0.5) * 80,
    (Math.random() - 0.5) * 40
  );
  
  shapes.push(shape);
  scene.add(shape);
}

// 5. 그리드 (미니멀)
const gridHelper = new THREE.GridHelper(200, 20, 0xffffff, 0x333333);
gridHelper.position.y = -30;
scene.add(gridHelper);

// ===== 오디오 =====
let audioContext, analyser, dataArray, currentSource;
let isPlaying = false;

document.getElementById('startBtn').addEventListener('click', function() {
  log('INIT');
  
  try {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 128;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    
    log('OK');
    
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('controls').classList.add('visible');
    
  } catch(e) {
    log(`ERR: ${e.message}`);
  }
});

document.getElementById('playTestBtn').addEventListener('click', function() {
  log('TEST');
  
  if (!audioContext) return;
  
  try {
    if (currentSource) {
      currentSource.stop();
      currentSource.disconnect();
    }
    
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    
    osc.connect(gain);
    gain.connect(analyser);
    analyser.connect(audioContext.destination);
    
    osc.frequency.value = 220;
    gain.gain.value = 0.3;
    osc.type = 'square';
    
    if (audioContext.state === 'suspended') {
      audioContext.resume();
    }
    
    osc.start();
    currentSource = osc;
    isPlaying = true;
    
    log('PLAY');
    
    setTimeout(() => {
      if (osc) {
        osc.stop();
        log('STOP');
      }
    }, 2000);
    
  } catch(e) {
    log(`ERR: ${e.message}`);
  }
});

document.getElementById('stopBtn').addEventListener('click', function() {
  if (currentSource) {
    currentSource.stop();
    currentSource = null;
    isPlaying = false;
    log('STOP');
  }
});

document.getElementById('uploadBtn').addEventListener('click', function() {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  log(`LOAD: ${file.name.substring(0, 20)}`);
  
  if (!audioContext) return;
  
  try {
    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
    
    log(`${Math.round(audioBuffer.duration)}S`);
    
    if (currentSource) {
      currentSource.stop();
      currentSource.disconnect();
    }
    
    const source = audioContext.createBufferSource();
    source.buffer = audioBuffer;
    source.loop = true;
    source.connect(analyser);
    analyser.connect(audioContext.destination);
    
    if (audioContext.state === 'suspended') {
      await audioContext.resume();
    }
    
    source.start(0);
    currentSource = source;
    isPlaying = true;
    
    log('PLAY');
    
  } catch(e) {
    log(`ERR: ${e.message}`);
  }
});

// ===== 애니메이션 =====
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;
  
  if (isPlaying && analyser && dataArray) {
    analyser.getByteFrequencyData(dataArray);
    
    const bass = dataArray.slice(0, 20).reduce((a,b) => a+b) / 20;
    const mid = dataArray.slice(20, 50).reduce((a,b) => a+b) / 30;
    
    // 중앙 큐브 - 강렬한 스케일 변화
    const scale = 1 + (bass/255) * 2;
    mainCube.scale.setScalar(scale);
    mainCube.rotation.x += 0.02;
    mainCube.rotation.y += 0.02;
    
    // 색상 반전 효과
    if (bass > 200) {
      mainCubeMat.color.setHex(0x000000);
      wireMat.color.setHex(0xffffff);
      scene.background.setHex(0xffffff);
    } else {
      mainCubeMat.color.setHex(0xffffff);
      wireMat.color.setHex(0xff0000);
      scene.background.setHex(0x000000);
    }
    
    // 와이어프레임
    wire.rotation.x -= 0.015;
    wire.rotation.y += 0.015;
    wire.scale.setScalar(1 + (mid/255) * 1.5);
    
    // 주파수 바 - 각진 움직임
    bars.forEach((bar, i) => {
      const idx = Math.floor((i / bars.length) * dataArray.length);
      const value = dataArray[idx] / 255;
      bar.scale.y = 1 + value * 20;
      bar.position.y = (bar.scale.y - 1) * 0.5;
      
      // 강렬한 색상 변화
      if (value > 0.7) {
        bar.material.color.setHex(0xff0000);
      } else {
        bar.material.color.setHex(i % 4 === 0 ? 0xff0000 : 0xffffff);
      }
    });
    
    // 기하학 형태들
    shapes.forEach((shape, i) => {
      const freqValue = dataArray[i * 8] / 255;
      shape.rotation.x += 0.01 * (i % 2 === 0 ? 1 : -1);
      shape.rotation.y += 0.01 * (i % 2 === 0 ? -1 : 1);
      shape.scale.setScalar(1 + freqValue * 0.5);
    });
    
    // 카메라 - 급격한 움직임
    camera.position.x = Math.sin(time * 2) * (bass/255) * 10;
    camera.position.y = Math.cos(time * 1.5) * (mid/255) * 8;
    camera.lookAt(scene.position);
    
  } else {
    // 기본 애니메이션
    mainCube.rotation.x += 0.005;
    mainCube.rotation.y += 0.005;
    wire.rotation.x -= 0.003;
    wire.rotation.y += 0.003;
    
    shapes.forEach((shape, i) => {
      shape.rotation.x += 0.002 * (i % 2 === 0 ? 1 : -1);
      shape.rotation.y += 0.002 * (i % 2 === 0 ? -1 : 1);
    });
  }
  
  renderer.render(scene, camera);
}

animate();

// 반응형
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

log('READY');
</script>
</body>
</html>
